<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4400">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Moto Racer X - Móvil</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
      touch-action: none;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    /* HUD */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    
    #speed-panel {
      position: fixed;
      bottom: 100px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      border-radius: 15px;
      padding: 6px 14px;
      border-left: 3px solid #ff4400;
    }
    #speed-val {
      font-size: 38px;
      color: #ff4400;
      font-weight: 900;
      font-family: monospace;
      line-height: 1;
    }
    #speed-unit {
      font-size: 9px;
      color: #fff;
      opacity: 0.7;
    }
    
    #lives-panel {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      padding: 5px 12px;
      display: flex;
      gap: 5px;
      font-size: 18px;
    }
    .heart { color: #ff3366; }
    .heart.lost { opacity: 0.3; }
    
    #coin-panel {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      padding: 5px 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #coin-count {
      color: #ffcc00;
      font-size: 16px;
      font-weight: bold;
    }
    #score-panel {
      position: fixed;
      top: 50px;
      right: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      padding: 3px 8px;
      font-size: 10px;
      color: #fff;
    }
    #weather-icon {
      position: fixed;
      top: 10px;
      right: 85px;
      font-size: 20px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      padding: 4px 7px;
    }
    
    /* CONTROLES TÁCTILES GRANDES */
    #controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px 20px;
      z-index: 20;
      pointer-events: auto;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    }
    
    .ctrl-btn {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.05s linear;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      font-weight: bold;
    }
    .ctrl-btn:active {
      transform: scale(0.92);
    }
    
    .steer-left, .steer-right {
      background: rgba(30,30,50,0.9);
      border: 2px solid #ff4400;
      font-size: 32px;
      color: #ff4400;
    }
    
    .gas-btn {
      background: radial-gradient(circle at 35% 35%, #44ff44, #00aa00);
      border: 2px solid #88ff88;
      font-size: 28px;
      color: #fff;
    }
    
    .brake-btn {
      background: radial-gradient(circle at 35% 35%, #ff4444, #aa0000);
      border: 2px solid #ff8888;
      font-size: 28px;
      color: #fff;
    }
    
    .nitro-btn {
      background: radial-gradient(circle at 35% 35%, #00aaff, #0066cc);
      border: 2px solid #88ccff;
      font-size: 24px;
      color: #fff;
    }
    
    .ctrl-label {
      font-size: 8px;
      margin-top: 4px;
      color: #fff;
    }
    
    .center-controls {
      display: flex;
      gap: 12px;
    }
    
    .pause-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      border: 1px solid #ff4400;
      color: #fff;
      font-size: 11px;
      padding: 4px 20px;
      border-radius: 20px;
      cursor: pointer;
      z-index: 30;
      pointer-events: auto;
    }
    
    /* Menús */
    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #0a0a2e, #1a1a3e);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: all 0.4s;
    }
    .menu-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .menu-title {
      font-size: 36px;
      font-weight: 900;
      color: #ff4400;
      text-shadow: 0 0 20px #ff4400;
      margin-bottom: 8px;
    }
    .menu-logo {
      font-size: 60px;
      margin-bottom: 10px;
      animation: float 2s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .menu-btn {
      background: linear-gradient(45deg, #ff4400, #ff8800);
      border: none;
      color: #fff;
      font-size: 16px;
      padding: 12px 35px;
      border-radius: 40px;
      margin: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 200px;
    }
    .menu-btn:active { transform: scale(0.96); }
    .menu-btn.secondary {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    #gameover-panel, #pause-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #gameover-panel.visible, #pause-panel.visible {
      opacity: 1;
      pointer-events: auto;
    }
    
    .damage-flash {
      animation: damageFlash 0.2s 2;
    }
    @keyframes damageFlash {
      0%,100% { background: transparent; }
      50% { background: rgba(255,0,0,0.5); }
    }
    
    @media (max-width: 600px) {
      .ctrl-btn { width: 65px; height: 65px; font-size: 24px; }
      .center-controls { gap: 8px; }
      #speed-val { font-size: 32px; }
    }
  </style>
</head>
<body>

<div id="main-menu" class="menu-overlay">
  <div class="menu-logo">🏍️</div>
  <div class="menu-title">MOTO RACER X</div>
  <div style="color:#fff;opacity:.7;font-size:11px;margin-bottom:25px">3 Carriles | Controles Táctiles</div>
  <button class="menu-btn" id="start-btn">🚀 INICIAR</button>
  <button class="menu-btn secondary" id="stats-btn">🏆 ESTADÍSTICAS</button>
</div>

<div id="gameover-panel">
  <div style="font-size:55px">💀</div>
  <div style="font-size:28px;font-weight:900;color:#ff4400">GAME OVER</div>
  <div style="margin:20px;text-align:center;color:#fff;line-height:1.6">
    🏆 Puntaje: <span id="go-score">0</span><br>
    📍 Distancia: <span id="go-dist">0</span>m<br>
    💰 Monedas: <span id="go-coins">0</span><br>
    ⚡ Récord: <span id="go-record">0</span>
  </div>
  <button class="menu-btn" id="restart-btn">🔄 REINTENTAR</button>
  <button class="menu-btn secondary" id="menu-back">🏠 MENÚ</button>
</div>

<div id="pause-panel">
  <div style="font-size:55px">⏸️</div>
  <div style="font-size:28px;font-weight:900;color:#fff">PAUSA</div>
  <button class="menu-btn" id="resume-btn">▶️ CONTINUAR</button>
</div>

<div id="hud">
  <div id="speed-panel">
    <div id="speed-val">0</div>
    <div id="speed-unit">KM/H</div>
  </div>
  <div id="lives-panel">❤️❤️❤️</div>
  <div id="coin-panel"><span>💰</span><span id="coin-count">0</span></div>
  <div id="score-panel">🏆 <span id="score-val">0</span></div>
  <div id="weather-icon">☀️</div>
</div>

<div id="controls">
  <div class="ctrl-btn steer-left" id="btn-left">◀<div class="ctrl-label">IZQ</div></div>
  <div class="center-controls">
    <div class="ctrl-btn gas-btn" id="btn-gas">⏺<div class="ctrl-label">GAS</div></div>
    <div class="ctrl-btn brake-btn" id="btn-brake">●<div class="ctrl-label">FRENO</div></div>
    <div class="ctrl-btn nitro-btn" id="btn-nitro">💨<div class="ctrl-label">NITRO</div></div>
  </div>
  <div class="ctrl-btn steer-right" id="btn-right">▶<div class="ctrl-label">DER</div></div>
</div>

<button class="pause-btn" id="pause-main">⏸ PAUSA</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
// CONFIGURACIÓN OPTIMIZADA PARA MÓVIL
const CONFIG={
  roadWidth:7.0,
  maxSpeed:150,
  baseAccel:0.5,
  nitroMult:1.6,
  nitroDrain:0.018,
  nitroRegen:0.025,
  turnSpeed:0.12,
  aiSpeed:85,
  numCars:6,
  numCoins:15,
  roadLeft:-3.0,
  roadRight:3.0,
  lanes:[-2.0, 0, 2.0]
};

let scene,camera,renderer,clock,bike,bikeLight;
let roadLines=[],cars=[],coins=[],trees=[];
let state={
  running:false,paused:false,speed:50,nitro:0.8,
  bikeX:0,bikeXVel:0,score:0,coins:0,lives:3,
  distance:0,maxSpeed:0,combo:1,invincible:0
};
let keys={left:false,right:false,gas:true,brake:false,nitro:false};
let exhaustParticles=[];
let lastTime=0;

function init(){
  clock=new THREE.Clock();
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x87CEEB);
  scene.fog=new THREE.FogExp2(0x87CEEB,0.008);
  
  camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,500);
  camera.position.set(0,2.2,4.8);
  camera.lookAt(0,0.5,-5);
  
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.shadowMap.enabled=true;
  document.body.appendChild(renderer.domElement);
  
  // Luces
  const ambient=new THREE.AmbientLight(0x88aaff,0.7);
  scene.add(ambient);
  const sun=new THREE.DirectionalLight(0xffeedd,1.2);
  sun.position.set(5,10,8);
  sun.castShadow=true;
  scene.add(sun);
  
  buildRoad();
  buildBike();
  buildTraffic();
  buildCoins();
  buildTrees();
  
  animate();
}

function buildRoad(){
  const asphalt=new THREE.MeshStandardMaterial({color:0x3a3a3a,roughness:0.6});
  for(let i=-40;i<40;i++){
    const seg=new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.roadWidth,2.8),asphalt);
    seg.rotation.x=-Math.PI/2;seg.position.set(0,-0.05,i*2.8);seg.receiveShadow=true;
    scene.add(seg);
  }
  
  const lineMat=new THREE.MeshStandardMaterial({color:0xffffee});
  for(let i=-40;i<40;i++){
    const center=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.05,0.8),lineMat);
    center.position.set(0,-0.02,i*2.8);scene.add(center);roadLines.push(center);
    const left=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.05,0.8),lineMat);
    left.position.set(-2.2,-0.02,i*2.8);scene.add(left);roadLines.push(left);
    const right=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.05,0.8),lineMat);
    right.position.set(2.2,-0.02,i*2.8);scene.add(right);roadLines.push(right);
  }
}

function buildBike(){
  bike=new THREE.Group();
  const bodyMat=new THREE.MeshStandardMaterial({color:0xff4400,metalness:0.8});
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.28,1.6),bodyMat);
  body.position.y=0.2;body.castShadow=true;bike.add(body);
  
  const seat=new THREE.Mesh(new THREE.BoxGeometry(0.45,0.1,0.6),new THREE.MeshStandardMaterial({color:0x222222}));
  seat.position.set(0,0.4,-0.35);bike.add(seat);
  
  const wheelMat=new THREE.MeshStandardMaterial({color:0x111111});
  const wheelGeo=new THREE.CylinderGeometry(0.28,0.28,0.4,12);
  [-0.4,0.4].forEach(x=>{
    const fw=new THREE.Mesh(wheelGeo,wheelMat);fw.rotation.z=Math.PI/2;fw.position.set(x,0.12,0.75);fw.castShadow=true;bike.add(fw);
    const rw=new THREE.Mesh(wheelGeo,wheelMat);rw.rotation.z=Math.PI/2;rw.position.set(x,0.12,-0.78);rw.castShadow=true;bike.add(rw);
  });
  
  bikeLight=new THREE.PointLight(0xffaa66,1.5,15);
  bikeLight.position.set(0,0.35,0.95);
  bike.add(bikeLight);
  
  scene.add(bike);
}

function buildTraffic(){
  const colors=[0xcc4444,0x4488cc,0x44aa55,0xddcc33];
  for(let i=0;i<CONFIG.numCars;i++){
    const g=new THREE.Group();
    const body=new THREE.Mesh(new THREE.BoxGeometry(0.75,0.38,1.45),new THREE.MeshStandardMaterial({color:colors[i%4]}));
    body.castShadow=true;g.add(body);
    const lane=CONFIG.lanes[Math.floor(Math.random()*3)];
    g.position.set(lane,0.18,-35-i*25);
    scene.add(g);
    cars.push({obj:g,speed:CONFIG.aiSpeed+Math.random()*30,lane:lane});
  }
}

function buildCoins(){
  for(let i=0;i<CONFIG.numCoins;i++){
    const coin=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,0.04,8),new THREE.MeshStandardMaterial({color:0xffcc00,emissive:0xff6600}));
    coin.rotation.x=Math.PI/2;
    const lane=CONFIG.lanes[Math.floor(Math.random()*3)]+(Math.random()-0.5)*0.6;
    coin.position.set(lane,0.22,-50-i*22);
    coin.userData={value:15};
    scene.add(coin);
    coins.push(coin);
  }
}

function buildTrees(){
  const trunkMat=new THREE.MeshStandardMaterial({color:0x5a3a1a});
  const leafMat=new THREE.MeshStandardMaterial({color:0x3a8a3a});
  for(let i=0;i<40;i++){
    const tree=new THREE.Group();
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.18,0.8,5),trunkMat);
    trunk.castShadow=true;tree.add(trunk);
    const leaf=new THREE.Mesh(new THREE.ConeGeometry(0.4,0.8,5),leafMat);
    leaf.position.y=0.9;leaf.castShadow=true;tree.add(leaf);
    const side=(Math.random()>.5?1:-1)*(CONFIG.roadWidth/2+1.2+Math.random()*1.5);
    tree.position.set(side,0.3,-15-i*12);
    tree.scale.setScalar(0.6+Math.random()*0.4);
    scene.add(tree);
    trees.push(tree);
  }
}

function updatePhysics(dt){
  if(!state.running||state.paused)return;
  
  const useNitro=keys.nitro&&state.nitro>0.05;
  
  if(keys.gas){
    let accel=CONFIG.baseAccel;
    if(useNitro){accel*=CONFIG.nitroMult;state.nitro-=CONFIG.nitroDrain;bikeLight.intensity=2.5;}
    else bikeLight.intensity=1.2;
    state.speed=Math.min(CONFIG.maxSpeed,state.speed+accel);
  }else if(keys.brake){
    state.speed=Math.max(25,state.speed-CONFIG.baseAccel*1.3);
    bikeLight.intensity=0.8;
  }else{
    state.speed=Math.max(35,state.speed*(1-dt*0.3));
    bikeLight.intensity=1.0;
  }
  
  if(!useNitro)state.nitro=Math.min(1,state.nitro+CONFIG.nitroRegen*dt*60);
  
  // Dirección
  if(keys.left)state.bikeXVel-=CONFIG.turnSpeed*dt*60;
  if(keys.right)state.bikeXVel+=CONFIG.turnSpeed*dt*60;
  state.bikeXVel*=0.94;
  
  let newX=state.bikeX+state.bikeXVel*dt*60;
  newX=Math.max(CONFIG.roadLeft,Math.min(CONFIG.roadRight,newX));
  state.bikeX=newX;
  
  bike.position.x=state.bikeX;
  bike.rotation.z=-state.bikeXVel*0.08;
  
  camera.position.x+=(state.bikeX*0.3-camera.position.x)*0.1;
  camera.lookAt(state.bikeX*0.4,0.4,-5);
  
  const scroll=state.speed*0.22*dt;
  roadLines.forEach(l=>{l.position.z+=scroll;if(l.position.z>6)l.position.z-=220;});
  trees.forEach(t=>{t.position.z+=scroll*0.8;if(t.position.z>18)t.position.z-=80;});
  
  // Tráfico
  cars.forEach(c=>{
    c.obj.position.z+=(state.speed-c.speed)*dt*0.7+scroll*0.55;
    if(c.obj.position.z>16){
      c.obj.position.z=-50-Math.random()*30;
      c.lane=CONFIG.lanes[Math.floor(Math.random()*3)];
      c.obj.position.x=c.lane;
    }
    if(state.invincible<=0){
      const dx=Math.abs(c.obj.position.x-state.bikeX);
      const dz=Math.abs(c.obj.position.z+0.55);
      if(dx<0.9&&dz<1.1){
        state.speed*=0.6;
        state.score=Math.max(0,state.score-80);
        state.combo=1;
        state.invincible=1.2;
        state.lives--;
        updateLives();
        if(state.lives<=0)gameOver();
        document.body.classList.add('damage-flash');
        setTimeout(()=>document.body.classList.remove('damage-flash'),200);
        c.obj.position.z+=3;
      }
    }
  });
  
  // Monedas
  coins.forEach(c=>{
    c.position.z+=scroll;
    c.rotation.y+=0.12;
    if(c.position.z>14){
      c.position.z=-80-Math.random()*50;
      c.position.x=CONFIG.lanes[Math.floor(Math.random()*3)]+(Math.random()-0.5)*0.6;
    }
    const dx=Math.abs(c.position.x-state.bikeX);
    const dz=Math.abs(c.position.z+0.3);
    if(dx<0.7&&dz<0.8){
      state.coins+=c.userData.value;
      state.score+=40;
      state.combo=Math.min(5,state.combo+0.15);
      showFloatingText("+💰"+c.userData.value);
      c.position.z=-90;
      c.position.x=CONFIG.lanes[Math.floor(Math.random()*3)];
    }
  });
  
  state.distance+=state.speed*dt;
  state.score+=state.speed*dt*0.7*state.combo;
  state.maxSpeed=Math.max(state.maxSpeed,state.speed);
  if(state.invincible>0)state.invincible-=dt;
  
  updateHUD();
  spawnExhaust();
}

function updateLives(){
  const hearts=document.getElementById('lives-panel');
  hearts.innerHTML='';
  for(let i=0;i<3;i++){
    hearts.innerHTML+=`<span class="heart ${i>=state.lives?'lost':''}">❤️</span>`;
  }
}

function showFloatingText(text){
  const div=document.createElement('div');
  div.textContent=text;
  div.style.position='fixed';
  div.style.left='50%';
  div.style.transform='translateX(-50%)';
  div.style.top=window.innerHeight/2+'px';
  div.style.color='#ffcc00';
  div.style.fontSize='20px';
  div.style.fontWeight='bold';
  div.style.pointerEvents='none';
  div.style.zIndex='200';
  div.style.textShadow='0 0 5px black';
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),700);
}

function updateHUD(){
  document.getElementById('speed-val').textContent=Math.floor(state.speed);
  document.getElementById('coin-count').textContent=Math.floor(state.coins);
  document.getElementById('score-val').textContent=Math.floor(state.score);
}

function spawnExhaust(){
  if(!state.running||state.paused||state.speed<50)return;
  const useNitro=keys.nitro&&state.nitro>0.05;
  const p=new THREE.Mesh(new THREE.SphereGeometry(0.05,4),new THREE.MeshStandardMaterial({color:useNitro?0x00aaff:0xff8833,emissive:useNitro?0x0088ff:0xff4400}));
  p.position.set(state.bikeX+(Math.random()-0.5)*0.3,0.1,-0.95);
  scene.add(p);
  exhaustParticles.push({mesh:p,life:1});
}

function updateExhaust(dt){
  for(let i=exhaustParticles.length-1;i>=0;i--){
    exhaustParticles[i].life-=dt*2.5;
    exhaustParticles[i].mesh.material.opacity=exhaustParticles[i].life;
    if(exhaustParticles[i].life<=0){scene.remove(exhaustParticles[i].mesh);exhaustParticles.splice(i,1);}
  }
}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.033);
  updatePhysics(dt);
  updateExhaust(dt);
  renderer.render(scene,camera);
}

// CONTROLES TÁCTILES
function initControls(){
  function bindBtn(id, onPress, onRelease){
    const btn=document.getElementById(id);
    if(!btn)return;
    const start=(e)=>{e.preventDefault();onPress();btn.style.transform='scale(0.92)';};
    const end=(e)=>{e.preventDefault();onRelease();btn.style.transform='scale(1)';};
    btn.addEventListener('mousedown',start);
    btn.addEventListener('mouseup',end);
    btn.addEventListener('mouseleave',end);
    btn.addEventListener('touchstart',start,{passive:false});
    btn.addEventListener('touchend',end);
    btn.addEventListener('touchcancel',end);
  }
  
  bindBtn('btn-left',()=>keys.left=true,()=>keys.left=false);
  bindBtn('btn-right',()=>keys.right=true,()=>keys.right=false);
  bindBtn('btn-gas',()=>keys.gas=true,()=>keys.gas=false);
  bindBtn('btn-brake',()=>keys.brake=true,()=>keys.brake=false);
  bindBtn('btn-nitro',()=>keys.nitro=true,()=>keys.nitro=false);
  
  document.getElementById('pause-main').addEventListener('click',togglePause);
  document.getElementById('resume-btn').addEventListener('click',togglePause);
}

function togglePause(){
  if(!state.running)return;
  state.paused=!state.paused;
  document.getElementById('pause-panel').classList.toggle('visible',state.paused);
}

function startGame(){
  state={
    running:true,paused:false,speed:50,nitro:0.8,bikeX:0,bikeXVel:0,
    score:0,coins:0,lives:3,distance:0,maxSpeed:0,combo:1,invincible:0
  };
  bike.position.x=0;
  keys.gas=true;
  updateLives();
  document.getElementById('main-menu').classList.add('hidden');
  document.getElementById('gameover-panel').classList.remove('visible');
  document.getElementById('pause-panel').classList.remove('visible');
}

function gameOver(){
  state.running=false;
  document.getElementById('go-score').textContent=Math.floor(state.score);
  document.getElementById('go-dist').textContent=Math.floor(state.distance);
  document.getElementById('go-coins').textContent=Math.floor(state.coins);
  const best=localStorage.getItem('motoBest')||0;
  const newBest=Math.max(state.score,best);
  localStorage.setItem('motoBest',Math.floor(newBest));
  localStorage.setItem('motoCoins',(+(localStorage.getItem('motoCoins')||0)+state.coins));
  document.getElementById('go-record').textContent=Math.floor(newBest);
  document.getElementById('gameover-panel').classList.add('visible');
}

function setupMenus(){
  document.getElementById('start-btn').addEventListener('click',startGame);
  document.getElementById('restart-btn').addEventListener('click',()=>{
    document.getElementById('gameover-panel').classList.remove('visible');
    startGame();
  });
  document.getElementById('menu-back').addEventListener('click',()=>{
    document.getElementById('gameover-panel').classList.remove('visible');
    document.getElementById('main-menu').classList.remove('hidden');
  });
  document.getElementById('stats-btn').addEventListener('click',()=>{
    const best=localStorage.getItem('motoBest')||0;
    const coins=localStorage.getItem('motoCoins')||0;
    alert(`🏆 ESTADÍSTICAS\n\nMejor Puntaje: ${Math.floor(best)}\n💰 Monedas totales: ${Math.floor(coins)}`);
  });
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

window.addEventListener('load',()=>{
  init();
  initControls();
  setupMenus();
  document.getElementById('coin-count').textContent=localStorage.getItem('motoCoins')||0;
});
})();
</script>
</body>
</html>
