<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff4400">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Moto Racer X - 3 Carriles Realista</title>
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22:%22Moto%20Racer%20X%22,
    %22short_name%22:%22MotoRacer%22,
    %22start_url%22:%22/%22,
    %22display%22:%22standalone%22,
    %22theme_color%22:%22%23ff4400%22,
    %22background_color%22:%22%23000000%22,
    %22icons%22:[
      {%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23ff4400'/%3E%3Ctext x='256' y='380' font-size='320' text-anchor='middle' fill='white' font-weight='bold'%3EM%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22%7D
    ]
  }">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
    body{overflow:hidden;background:#000;font-family:'Segoe UI','Poppins',system-ui,sans-serif}
    canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
    
    /* HUD */
    #hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
    
    /* Velocímetro realista */
    #speed-panel{position:fixed;bottom:140px;left:15px;background:linear-gradient(145deg,rgba(0,0,0,.95),rgba(20,20,30,.9));backdrop-filter:blur(10px);border-radius:20px;padding:8px 16px;border-left:3px solid #ff4400;box-shadow:0 5px 20px rgba(0,0,0,.5)}
    #speed-val{font-size:48px;color:#ff4400;font-weight:900;font-family:'Monaco','Courier New',monospace;line-height:1}
    #speed-unit{font-size:10px;color:#fff;opacity:.6}
    #rpm-bar{width:100%;height:2px;background:#333;margin-top:4px;border-radius:2px}
    #rpm-fill{height:100%;width:60%;background:linear-gradient(90deg,#0f0,#ff0,#f00);border-radius:2px}
    
    /* Vidas */
    #lives-panel{position:fixed;top:12px;left:12px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border-radius:25px;padding:6px 14px;display:flex;gap:6px;font-size:22px}
    .heart{color:#ff3366}
    .heart.lost{opacity:0.2}
    
    /* Monedas y score */
    #coin-panel{position:fixed;top:12px;right:12px;background:rgba(0,0,0,.5);backdrop-filter:blur(10px);border-radius:25px;padding:6px 16px;display:flex;align-items:center;gap:6px}
    #coin-count{color:gold;font-size:18px;font-weight:900}
    #score-panel{position:fixed;top:60px;right:12px;background:rgba(0,0,0,.4);border-radius:15px;padding:4px 10px;font-size:11px;color:#fff}
    #weather-icon{position:fixed;top:12px;right:100px;font-size:24px;background:rgba(0,0,0,.4);border-radius:50%;padding:5px 8px}
    
    /* Combo flotante */
    #combo-pop{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:900;color:#ff8800;text-shadow:0 0 20px rgba(255,136,0,.8);pointer-events:none;opacity:0;transition:opacity .2s;z-index:15}
    
    /* CONTROLES ESTILO COCHE REAL - PEDALES CON FORMA REAL */
    #controls-container{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;gap:12px;padding:12px 15px 20px;z-index:20;pointer-events:auto;background:linear-gradient(to top,rgba(0,0,0,.6),transparent)}
    
    /* Volante profesional */
    .steering-wheel{width:130px;height:130px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#3a3a3a,#1a1a1a);border:3px solid #ff4400;box-shadow:0 8px 20px rgba(0,0,0,.5),inset 0 2px 5px rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative}
    .steering-wheel:active{transform:scale(0.97)}
    .wheel-icon{font-size:42px;color:#ff4400;margin-bottom:4px}
    .wheel-label{font-size:9px;color:#fff;opacity:.7}
    .wheel-arrows{position:absolute;width:100%;display:flex;justify-content:space-between;padding:0 12px;top:50%;transform:translateY(-50%);pointer-events:none}
    .wheel-arrows span{font-size:20px;color:#ff4400;opacity:.6}
    
    /* Pedales con forma REAL de coche (metal, con relieve) */
    .pedals-container{display:flex;gap:12px;background:rgba(0,0,0,.3);border-radius:30px;padding:8px 12px}
    
    .real-pedal{width:85px;height:95px;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .06s linear;box-shadow:0 5px 15px rgba(0,0,0,.5),inset 0 1px 3px rgba(255,255,255,.2);position:relative;overflow:hidden}
    .real-pedal:active{transform:scale(0.94)}
    
    /* Pedal Acelerador - Estilo coche real (metal pulido) */
    .gas-pedal-real{background:linear-gradient(145deg,#c0c0c0,#a0a0a0);border-bottom:4px solid #00aa44;border-right:2px solid rgba(0,0,0,.2)}
    .gas-pedal-real::before{content:'';position:absolute;top:5px;left:8px;right:8px;height:30%;background:linear-gradient(135deg,rgba(255,255,255,.4),transparent);border-radius:12px}
    .gas-pedal-real .pedal-symbol{font-size:32px;color:#00aa44;text-shadow:0 1px 2px rgba(0,0,0,.3)}
    
    /* Pedal Freno - Estilo coche real (metal oscuro) */
    .brake-pedal-real{background:linear-gradient(145deg,#888,#666);border-bottom:4px solid #cc0000;border-right:2px solid rgba(0,0,0,.2)}
    .brake-pedal-real::before{content:'';position:absolute;top:5px;left:8px;right:8px;height:30%;background:linear-gradient(135deg,rgba(255,255,255,.3),transparent);border-radius:12px}
    .brake-pedal-real .pedal-symbol{font-size:32px;color:#cc0000;text-shadow:0 1px 2px rgba(0,0,0,.3)}
    
    .pedal-label-real{font-size:9px;font-weight:bold;color:#333;margin-top:6px;text-transform:uppercase;letter-spacing:1px}
    
    /* Botón Nitro estilo botón de carrera */
    .nitro-btn-real{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#0088dd,#0044aa);box-shadow:0 0 12px #0088ff,inset 0 1px 3px rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
    .nitro-btn-real:active{transform:scale(0.93);background:#00aaff;box-shadow:0 0 20px #00aaff}
    .nitro-icon{font-size:34px}
    .nitro-label{font-size:9px;margin-top:3px;font-weight:bold;color:#fff}
    
    /* Botón pausa */
    .pause-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:13px;padding:5px 22px;border-radius:25px;cursor:pointer;z-index:30;pointer-events:auto;bottom:145px}
    
    /* Menús */
    .menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(145deg,#050510,#0a0a2e,#000);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;transition:all .4s}
    .menu-overlay.hidden{opacity:0;pointer-events:none}
    .menu-title{font-size:44px;font-weight:900;color:#ff4400;text-shadow:0 0 30px rgba(255,68,0,.8);margin-bottom:8px}
    .menu-logo{font-size:70px;margin-bottom:8px;animation:float 2s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .menu-btn{background:linear-gradient(45deg,#ff4400,#ff8800);border:none;color:#fff;font-size:17px;padding:12px 35px;border-radius:50px;margin:6px;cursor:pointer;font-weight:bold;width:220px}
    .menu-btn:active{transform:scale(0.96)}
    .menu-btn.secondary{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}
    
    .settings-panel{background:rgba(0,0,0,.8);backdrop-filter:blur(20px);border-radius:25px;padding:20px;margin:15px;width:280px}
    .settings-row{display:flex;justify-content:space-between;align-items:center;margin:12px 0;color:#fff;font-size:14px}
    .toggle-switch{width:48px;height:26px;background:#333;border-radius:13px;cursor:pointer;position:relative}
    .toggle-switch.active{background:#ff4400}
    .toggle-switch::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:11px;top:2px;left:3px;transition:.2s}
    .toggle-switch.active::after{left:23px}
    
    #gameover-panel,#pause-panel{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);backdrop-filter:blur(10px);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:90;opacity:0;pointer-events:none;transition:opacity .3s}
    #gameover-panel.visible,#pause-panel.visible{opacity:1;pointer-events:auto}
    
    @media(max-width:600px){
      .steering-wheel{width:100px;height:100px}
      .wheel-icon{font-size:32px}
      .real-pedal{width:70px;height:80px}
      .gas-pedal-real .pedal-symbol,.brake-pedal-real .pedal-symbol{font-size:26px}
      .nitro-btn-real{width:65px;height:65px}
      .nitro-icon{font-size:28px}
      .pause-btn{bottom:135px}
      .menu-title{font-size:32px}
    }
    
    .damage-flash{animation:damageFlash .2s 2}
    @keyframes damageFlash{0%,100%{background:transparent}50%{background:rgba(255,0,0,.4)}}
    .coin-pop{position:fixed;animation:coinFloat 1s ease-out forwards;pointer-events:none;z-index:200;font-size:20px;font-weight:bold}
    @keyframes coinFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px)}}
  </style>
</head>
<body>

<div id="main-menu" class="menu-overlay">
  <div class="menu-logo">🏍️🔥</div>
  <div class="menu-title">MOTO RACER X</div>
  <div style="color:#fff;opacity:.7;font-size:12px;margin-bottom:25px">3 Carriles | Controles Reales | Nitro</div>
  <button class="menu-btn" id="start-btn">🚀 INICIAR</button>
  <button class="menu-btn secondary" id="settings-btn">⚙️ AJUSTES</button>
  <button class="menu-btn secondary" id="stats-btn">🏆 ESTADÍSTICAS</button>
</div>

<div id="settings-menu" class="menu-overlay hidden">
  <div class="menu-title" style="font-size:28px">⚙️ AJUSTES</div>
  <div class="settings-panel">
    <div class="settings-row">🎮 Controles<div id="ctrl-toggle" class="toggle-switch active"></div></div>
    <div class="settings-row">🌙 Modo noche<div id="night-toggle" class="toggle-switch"></div></div>
  </div>
  <button class="menu-btn secondary" id="settings-back">◀ VOLVER</button>
</div>

<div id="gameover-panel">
  <div style="font-size:55px">💀</div>
  <div style="font-size:30px;font-weight:900;color:#ff4400">GAME OVER</div>
  <div style="margin:20px;text-align:center;color:#fff;line-height:1.8">
    🏆 Puntaje: <span id="go-score">0</span><br>
    📍 Distancia: <span id="go-dist">0</span>m<br>
    💰 Monedas: <span id="go-coins">0</span><br>
    ⚡ Récord: <span id="go-record">0</span>
  </div>
  <button class="menu-btn" id="restart-btn">🔄 REINTENTAR</button>
  <button class="menu-btn secondary" id="menu-back">🏠 MENÚ</button>
</div>

<div id="pause-panel">
  <div style="font-size:55px">⏸️</div>
  <div style="font-size:30px;font-weight:900;color:#fff">PAUSA</div>
  <button class="menu-btn" id="resume-btn">▶️ CONTINUAR</button>
</div>

<div id="hud">
  <div id="speed-panel">
    <div id="speed-val">0</div>
    <div id="speed-unit">KM/H</div>
    <div id="rpm-bar"><div id="rpm-fill"></div></div>
  </div>
  <div id="lives-panel">❤️❤️❤️</div>
  <div id="coin-panel"><span>💰</span><span id="coin-count">0</span></div>
  <div id="score-panel">🏆 <span id="score-val">0</span></div>
  <div id="weather-icon">☀️</div>
  <div id="combo-pop"></div>
</div>

<!-- CONTROLES ESTILO COCHE REAL -->
<div id="controls-container">
  <!-- Volante -->
  <div class="steering-wheel" id="steering-wheel">
    <div class="wheel-icon">🚗</div>
    <div class="wheel-label">VOLANTE</div>
    <div class="wheel-arrows"><span>◀</span><span>▶</span></div>
  </div>
  
  <!-- Pedales con forma REAL -->
  <div class="pedals-container">
    <div class="real-pedal gas-pedal-real" id="gas-pedal">
      <div class="pedal-symbol">⏺</div>
      <div class="pedal-label-real">ACELERAR</div>
    </div>
    <div class="real-pedal brake-pedal-real" id="brake-pedal">
      <div class="pedal-symbol">●</div>
      <div class="pedal-label-real">FRENAR</div>
    </div>
  </div>
  
  <!-- Botón Nitro -->
  <div class="nitro-btn-real" id="nitro-btn">
    <div class="nitro-icon">💨</div>
    <div class="nitro-label">NITRO</div>
  </div>
</div>

<button class="pause-btn" id="pause-main">⏸ PAUSA</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
// ========== CONFIGURACIÓN - CARRETERA DE 3 CARRILES ==========
const CONFIG={
  roadWidth:9.0,        // Carretera ancha para 3 carriles
  laneWidth:3.0,        // Ancho de cada carril
  segLen:2.6,
  maxSpeed:380,
  baseAccel:0.78,
  nitroMult:2.3,
  nitroDrain:0.026,
  nitroRegen:0.014,
  turnBase:0.16,
  aiSpeed:145,
  numCars:12,
  numObstacles:10,
  numCoins:30,
  roadLeftLimit:-4.2,   // Límite izquierdo (carril 1)
  roadRightLimit:4.2,   // Límite derecho (carril 3)
  lanes:[-3.0, 0, 3.0]  // Posiciones de los 3 carriles
};

let scene,camera,renderer,clock,bikeGroup,bikeBody,wheels=[],frontLight;
let roadLines=[],cars=[],obstacles=[],coins=[];
let rain,stars,ambLight,sunLight;
let state={
  running:false,paused:false,speed:85,nitro:0.8,bikeX:0,bikeXVel:0,
  score:0,coins:0,lives:3,distance:0,maxSpeed:0,combo:1,
  weather:'clear',timeOfDay:0.6,drift:0,invincible:0
};
let keys={left:false,right:false,up:false,down:false,nitro:false};
let settings={useButtons:true,nightMode:false};
let exhaustParticles=[];
let lastExhaust=0;

// ========== THREE.JS ==========
function initThree(){
  clock=new THREE.Clock();
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0a1030);
  scene.fog=new THREE.FogExp2(0x0a1030,0.008);
  
  camera=new THREE.PerspectiveCamera(68,innerWidth/innerHeight,0.1,500);
  camera.position.set(0,2.5,5.3);
  
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;
  document.body.appendChild(renderer.domElement);
  
  ambLight=new THREE.AmbientLight(0x303060,0.6);
  scene.add(ambLight);
  sunLight=new THREE.DirectionalLight(0xffcc88,1.6);
  sunLight.position.set(8,15,10);
  sunLight.castShadow=true;
  scene.add(sunLight);
  
  buildRoad3Lanes();
  buildBike();
  buildTraffic();
  buildObstacles();
  buildCoins();
  buildEnvironment();
  buildWeather();
}

// CARRETERA DE 3 CARRILES
function buildRoad3Lanes(){
  const asphaltMat=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.7});
  for(let i=-50;i<50;i++){
    const seg=new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.roadWidth,CONFIG.segLen),asphaltMat);
    seg.rotation.x=-Math.PI/2;seg.position.set(0,-0.08,i*CONFIG.segLen);seg.receiveShadow=true;
    scene.add(seg);
  }
  
  // Líneas divisorias de carriles (3 carriles = 2 líneas divisorias)
  const lineMat=new THREE.MeshStandardMaterial({color:0xffcc44,emissive:0x442200});
  for(let i=-50;i<50;i++){
    // Línea central (entre carril 2 y 3)
    const centerLine=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.06,1.2),lineMat);
    centerLine.position.set(0,-0.04,i*CONFIG.segLen);scene.add(centerLine);roadLines.push(centerLine);
    
    // Línea izquierda (entre carril 1 y 2)
    const leftDivider=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.06,1.2),lineMat);
    leftDivider.position.set(-3.0,-0.04,i*CONFIG.segLen);scene.add(leftDivider);roadLines.push(leftDivider);
    
    // Línea derecha (borde)
    const rightDivider=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.06,1.2),lineMat);
    rightDivider.position.set(3.0,-0.04,i*CONFIG.segLen);scene.add(rightDivider);roadLines.push(rightDivider);
    
    // Bordes blancos
    const leftEdge=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.06,CONFIG.segLen),new THREE.MeshStandardMaterial({color:0xffaa66}));
    leftEdge.position.set(-CONFIG.roadWidth/2+0.25,-0.04,i*CONFIG.segLen);scene.add(leftEdge);
    const rightEdge=leftEdge.clone();rightEdge.position.x=CONFIG.roadWidth/2-0.25;scene.add(rightEdge);
  }
}

function buildBike(){
  bikeGroup=new THREE.Group();
  const bodyMat=new THREE.MeshStandardMaterial({color:0xff4400,metalness:0.9,roughness:0.2,emissive:0xff2200,emissiveIntensity:0.05});
  bikeBody=new THREE.Mesh(new THREE.BoxGeometry(0.72,0.32,1.9),bodyMat);
  bikeBody.position.y=0.22;bikeBody.castShadow=true;bikeGroup.add(bikeBody);
  
  const fairing=new THREE.Mesh(new THREE.BoxGeometry(0.65,0.28,0.95),new THREE.MeshStandardMaterial({color:0xdd3300,metalness:0.8}));
  fairing.position.set(0,0.44,0.58);fairing.castShadow=true;bikeGroup.add(fairing);
  
  const seat=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.12,0.78),new THREE.MeshStandardMaterial({color:0x111111}));
  seat.position.set(0,0.44,-0.42);bikeGroup.add(seat);
  
  const wheelMat=new THREE.MeshStandardMaterial({color:0x111111,roughness:0.4});
  const wheelGeo=new THREE.CylinderGeometry(0.36,0.36,0.52,24);
  [-0.52,0.52].forEach(x=>{
    const fw=new THREE.Mesh(wheelGeo,wheelMat);fw.rotation.z=Math.PI/2;fw.position.set(x,0.13,0.88);fw.castShadow=true;bikeGroup.add(fw);wheels.push(fw);
    const rw=new THREE.Mesh(wheelGeo,wheelMat);rw.rotation.z=Math.PI/2;rw.position.set(x,0.13,-0.91);rw.castShadow=true;bikeGroup.add(rw);wheels.push(rw);
  });
  
  frontLight=new THREE.SpotLight(0xffcc88,3,25,Math.PI/6,0.6);
  frontLight.position.set(0,0.5,1.15);frontLight.target.position.set(0,-0.3,-10);
  bikeGroup.add(frontLight);bikeGroup.add(frontLight.target);
  
  scene.add(bikeGroup);
}

function buildTraffic(){
  const colors=[0xcc3333,0x2266cc,0x33aa44,0xeebb22,0x9933cc,0xee6622];
  for(let i=0;i<CONFIG.numCars;i++){
    const g=new THREE.Group();
    const body=new THREE.Mesh(new THREE.BoxGeometry(0.88,0.44,1.65),new THREE.MeshStandardMaterial({color:colors[i%6],metalness:0.5}));
    body.castShadow=true;g.add(body);
    const roof=new THREE.Mesh(new THREE.BoxGeometry(0.68,0.3,1.0),new THREE.MeshStandardMaterial({color:0x2a2a2a}));
    roof.position.y=0.38;g.add(roof);
    const wheelGeom=new THREE.SphereGeometry(0.18,12);
    const wheelMat=new THREE.MeshStandardMaterial({color:0x111111});
    [[-0.55,0.1,-0.68],[0.55,0.1,-0.68],[-0.55,0.1,0.68],[0.55,0.1,0.68]].forEach(p=>{
      const w=new THREE.Mesh(wheelGeom,wheelMat);w.position.set(p[0],p[1],p[2]);w.scale.set(0.8,0.5,0.8);g.add(w);
    });
    // Asignar a uno de los 3 carriles
    const laneIndex=Math.floor(Math.random()*3);
    const laneX=CONFIG.lanes[laneIndex];
    g.position.set(laneX,0.22,-38-i*24);
    scene.add(g);
    cars.push({obj:g,speed:CONFIG.aiSpeed+Math.random()*75,lane:laneX});
  }
}

function buildObstacles(){
  for(let i=0;i<CONFIG.numObstacles;i++){
    const g=new THREE.Group();
    const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.36,0.65,10),new THREE.MeshStandardMaterial({color:0xcc6600,roughness:0.6}));
    barrel.castShadow=true;g.add(barrel);
    const laneIndex=Math.floor(Math.random()*3);
    const laneX=CONFIG.lanes[laneIndex];
    g.position.set(laneX,0.22,-55-i*40);
    scene.add(g);
    obstacles.push({obj:g,lane:laneX,hit:false});
  }
}

function buildCoins(){
  for(let i=0;i<CONFIG.numCoins;i++){
    const coinGroup=new THREE.Group();
    const coinBody=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,0.04,16),new THREE.MeshStandardMaterial({color:0xffcc00,metalness:0.85,emissive:0xff8800,emissiveIntensity:0.4}));
    coinBody.rotation.x=Math.PI/2;coinGroup.add(coinBody);
    const laneIndex=Math.floor(Math.random()*3);
    const laneX=CONFIG.lanes[laneIndex]+(Math.random()-0.5)*0.8;
    coinGroup.position.set(laneX,0.28,-60-i*22);
    coinGroup.userData={value:15};
    scene.add(coinGroup);
    coins.push(coinGroup);
  }
}

function buildEnvironment(){
  const starGeo=new THREE.BufferGeometry();
  const starPos=[];
  for(let i=0;i<1200;i++){starPos.push((Math.random()-.5)*350);starPos.push(15+Math.random()*55);starPos.push((Math.random()-.5)*200-60);}
  starGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(starPos),3));
  stars=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.08}));
  scene.add(stars);
}

function buildWeather(){
  const N=1500,geo=new THREE.BufferGeometry(),pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){pos[i*3]=(Math.random()-.5)*55;pos[i*3+1]=Math.random()*16;pos[i*3+2]=(Math.random()-.5)*70-30;}
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  rain=new THREE.Points(geo,new THREE.PointsMaterial({color:0x88aaff,size:0.07,transparent:true,opacity:0}));
  scene.add(rain);
}

// ========== FÍSICA CON 3 CARRILES ==========
function updatePhysics(dt){
  if(!state.running||state.paused)return;
  const useNitro=keys.nitro&&state.nitro>0.05;
  
  if(keys.up){
    let accel=CONFIG.baseAccel;
    if(useNitro){accel*=CONFIG.nitroMult;state.nitro=Math.max(0,state.nitro-CONFIG.nitroDrain);bikeBody.material.emissiveIntensity=0.4;frontLight.intensity=2.5;}
    else{bikeBody.material.emissiveIntensity=0.08;frontLight.intensity=1.2;}
    state.speed=Math.min(CONFIG.maxSpeed,state.speed+accel);
  }else if(keys.down){
    state.speed=Math.max(30,state.speed-CONFIG.baseAccel*1.4);
    frontLight.intensity=0.8;
  }else{
    state.speed=Math.max(45,state.speed*(1-dt*0.38));
    frontLight.intensity=1.0;
  }
  if(!useNitro)state.nitro=Math.min(1,state.nitro+CONFIG.nitroRegen*dt*60);
  
  // Dirección con límites de 3 carriles
  const turn=CONFIG.turnBase*(0.55+state.speed/CONFIG.maxSpeed*0.55);
  if(keys.left){state.bikeXVel-=turn*dt*60;state.drift=Math.max(-1,state.drift-dt*2);}
  else if(keys.right){state.bikeXVel+=turn*dt*60;state.drift=Math.min(1,state.drift+dt*2);}
  else state.drift*=0.94;
  state.bikeXVel*=0.91;
  // Límites estrictos de la carretera (no salirse)
  state.bikeX=Math.max(CONFIG.roadLeftLimit,Math.min(CONFIG.roadRightLimit,state.bikeX+state.bikeXVel*dt*60));
  bikeGroup.position.x=state.bikeX;
  bikeGroup.rotation.z=-state.drift*0.22;
  bikeGroup.rotation.y=state.bikeXVel*0.08;
  wheels.forEach(w=>w.rotation.x+=state.speed*0.05*dt*60);
  
  camera.position.x+=(state.bikeX*0.4-camera.position.x)*0.1;
  camera.position.z=5.2-(state.speed/CONFIG.maxSpeed)*1.0;
  camera.position.y=2.5+(state.speed/CONFIG.maxSpeed)*0.3;
  camera.lookAt(state.bikeX*0.6,0.6,-7);
  
  const scroll=state.speed*0.24*dt;
  roadLines.forEach(l=>{l.position.z+=scroll;if(l.position.z>8)l.position.z-=240;});
  
  // Tráfico
  cars.forEach(c=>{
    c.obj.position.z+=(state.speed-c.speed)*dt*0.85+scroll*0.65;
    if(c.obj.position.z>18){
      c.obj.position.z=-65-Math.random()*45;
      const laneIndex=Math.floor(Math.random()*3);
      c.lane=CONFIG.lanes[laneIndex];
      c.obj.position.x=c.lane;
    }
    if(state.invincible<=0){
      const dx=Math.abs(c.obj.position.x-state.bikeX),dz=Math.abs(c.obj.position.z+0.7);
      if(dx<1.05&&dz<1.35){
        state.speed*=0.5;state.score=Math.max(0,state.score-200);state.combo=1;
        state.invincible=1.2;
        state.lives--;
        updateLives();
        if(state.lives<=0)gameOver();
        document.body.classList.add('damage-flash');
        setTimeout(()=>document.body.classList.remove('damage-flash'),250);
        c.obj.position.z+=3;
      }
    }
  });
  
  // Obstáculos
  obstacles.forEach(o=>{
    o.obj.position.z+=scroll;
    if(o.obj.position.z>18){
      o.obj.position.z=-80-Math.random()*60;
      const laneIndex=Math.floor(Math.random()*3);
      o.lane=CONFIG.lanes[laneIndex];
      o.obj.position.x=o.lane;
      o.hit=false;
    }
    if(!o.hit&&state.invincible<=0){
      const dx=Math.abs(o.obj.position.x-state.bikeX),dz=Math.abs(o.obj.position.z+0.45);
      if(dx<0.95&&dz<0.95){
        state.coins=Math.max(0,state.coins-30);
        state.speed*=0.85;
        o.hit=true;
        showFloatingText("-💰30");
        state.invincible=0.8;
      }
    }
  });
  
  // Monedas
  coins.forEach(c=>{
    c.position.z+=scroll;
    c.rotation.y+=0.12;c.rotation.x=Math.sin(Date.now()*0.008)*0.5;
    if(c.position.z>15){
      c.position.z=-100-Math.random()*70;
      const laneIndex=Math.floor(Math.random()*3);
      c.position.x=CONFIG.lanes[laneIndex]+(Math.random()-0.5)*0.8;
    }
    const dx=Math.abs(c.position.x-state.bikeX),dz=Math.abs(c.position.z+0.35);
    if(dx<0.85&&dz<0.95){
      state.coins+=c.userData.value;state.score+=80;state.combo=Math.min(8,state.combo+0.3);
      showFloatingText("+💰"+c.userData.value);
      c.position.z=-120;
      const laneIndex=Math.floor(Math.random()*3);
      c.position.x=CONFIG.lanes[laneIndex];
    }
  });
  
  state.distance+=state.speed*dt;
  state.score+=state.speed*dt*0.9*state.combo;
  state.maxSpeed=Math.max(state.maxSpeed,state.speed);
  if(state.invincible>0)state.invincible-=dt;
  
  const rpmPercent=Math.min(1,state.speed/CONFIG.maxSpeed);
  document.getElementById('rpm-fill').style.width=(rpmPercent*100)+'%';
  updateHUD();
}

function updateLives(){
  const heartsDiv=document.getElementById('lives-panel');
  heartsDiv.innerHTML='';
  for(let i=0;i<3;i++){
    heartsDiv.innerHTML+=`<span class="heart ${i>=state.lives?'lost':''}">❤️</span>`;
  }
}

function showFloatingText(text){
  const div=document.createElement('div');
  div.textContent=text;
  div.className='coin-pop';
  div.style.left='50%';
  div.style.transform='translateX(-50%)';
  div.style.top=innerHeight/2+'px';
  div.style.color=text.includes('+')?'#ffcc00':'#ff6666';
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),800);
}

function updateWeather(dt){
  if(Math.random()<0.0015){
    const types=['clear','clear','rain','fog'];
    state.weather=types[Math.floor(Math.random()*types.length)];
    const icons={clear:'☀️',rain:'🌧️',fog:'🌫️'};
    document.getElementById('weather-icon').textContent=icons[state.weather];
    if(state.weather==='rain'){rain.material.opacity=0.65;scene.fog.density=0.02;}
    else if(state.weather==='fog'){rain.material.opacity=0;scene.fog.density=0.05;}
    else{rain.material.opacity=0;scene.fog.density=0.01;}
  }
  if(state.weather==='rain')rain.rotation.y+=0.018;
  state.timeOfDay+=dt*0.0007;
  if(state.timeOfDay>1)state.timeOfDay=0;
  const intensity=0.35+Math.sin(state.timeOfDay*Math.PI)*0.85;
  sunLight.intensity=intensity*(settings.nightMode?0.4:1);
}

function updateHUD(){
  document.getElementById('speed-val').textContent=Math.floor(state.speed);
  document.getElementById('coin-count').textContent=Math.floor(state.coins);
  document.getElementById('score-val').textContent=Math.floor(state.score);
  const comboDiv=document.getElementById('combo-pop');
  if(state.combo>1.3){
    comboDiv.textContent=`⚡ COMBO x${state.combo.toFixed(1)} ⚡`;
    comboDiv.style.opacity='0.9';
    setTimeout(()=>comboDiv.style.opacity='0',250);
  }
}

function spawnExhaust(){
  if(!state.running||state.paused||state.speed<75)return;
  const useNitro=keys.nitro&&state.nitro>0.05;
  for(let i=0;i<(useNitro?2:1);i++){
    const p=new THREE.Mesh(new THREE.SphereGeometry(0.07,5),new THREE.MeshStandardMaterial({color:useNitro?0x00aaff:0xff7733,emissive:useNitro?0x0088ff:0xff4400}));
    p.position.set(state.bikeX+(Math.random()-.5)*0.4,0.12,-1.15);
    scene.add(p);
    exhaustParticles.push({mesh:p,life:1});
  }
}

function updateExhaust(dt){
  for(let i=exhaustParticles.length-1;i>=0;i--){
    exhaustParticles[i].life-=dt*2.8;
    exhaustParticles[i].mesh.material.opacity=exhaustParticles[i].life;
    if(exhaustParticles[i].life<=0){scene.remove(exhaustParticles[i].mesh);exhaustParticles.splice(i,1);}
  }
}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.033);
  updatePhysics(dt);
  updateWeather(dt);
  updateExhaust(dt);
  lastExhaust+=dt;
  if(lastExhaust>0.04){spawnExhaust();lastExhaust=0;}
  if(stars)stars.rotation.y+=dt*0.0004;
  renderer.render(scene,camera);
}

// ========== CONTROLES ==========
function initControls(){
  window.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')keys.left=true;
    if(e.key==='ArrowRight')keys.right=true;
    if(e.key==='ArrowUp')keys.up=true;
    if(e.key==='ArrowDown')keys.down=true;
    if(e.key===' '){e.preventDefault();keys.nitro=true;}
    if(e.key==='p')togglePause();
  });
  window.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft')keys.left=false;
    if(e.key==='ArrowRight')keys.right=false;
    if(e.key==='ArrowUp')keys.up=false;
    if(e.key==='ArrowDown')keys.down=false;
    if(e.key===' ')keys.nitro=false;
  });
  
  // Volante táctil
  const wheel=document.getElementById('steering-wheel');
  let wheelActive=false;
  const onWheelStart=(e)=>{e.preventDefault();wheelActive=true;};
  const onWheelMove=(e)=>{
    if(!wheelActive||!settings.useButtons)return;
    const rect=wheel.getBoundingClientRect();
    const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const percent=x/rect.width;
    if(percent<0.3){keys.left=true;keys.right=false;}
    else if(percent>0.7){keys.right=true;keys.left=false;}
    else{keys.left=false;keys.right=false;}
  };
  const onWheelEnd=()=>{wheelActive=false;keys.left=false;keys.right=false;};
  wheel.addEventListener('mousedown',onWheelStart);
  window.addEventListener('mousemove',onWheelMove);
  window.addEventListener('mouseup',onWheelEnd);
  wheel.addEventListener('touchstart',onWheelStart,{passive:false});
  window.addEventListener('touchmove',onWheelMove,{passive:false});
  window.addEventListener('touchend',onWheelEnd);
  
  function bindPedal(id,onPress,onRelease){
    const btn=document.getElementById(id);
    const start=(e)=>{e.preventDefault();onPress();};
    const end=(e)=>{e.preventDefault();onRelease();};
    btn.addEventListener('mousedown',start);btn.addEventListener('mouseup',end);
    btn.addEventListener('mouseleave',end);btn.addEventListener('touchstart',start,{passive:false});
    btn.addEventListener('touchend',end);btn.addEventListener('touchcancel',end);
  }
  bindPedal('gas-pedal',()=>keys.up=true,()=>keys.up=false);
  bindPedal('brake-pedal',()=>keys.down=true,()=>keys.down=false);
  bindPedal('nitro-btn',()=>keys.nitro=true,()=>keys.nitro=false);
  
  document.getElementById('pause-main').addEventListener('click',togglePause);
  document.getElementById('resume-btn').addEventListener('click',togglePause);
}

function togglePause(){
  if(!state.running)return;
  state.paused=!state.paused;
  document.getElementById('pause-panel').classList.toggle('visible',state.paused);
}

function startGame(){
  state={...state,running:true,paused:false,speed:85,nitro:0.8,bikeX:0,bikeXVel:0,
    score:0,coins:0,lives:3,distance:0,maxSpeed:0,combo:1,invincible:0};
  bikeGroup.position.x=0;keys.up=true;
  updateLives();
  document.getElementById('main-menu').classList.add('hidden');
  document.getElementById('gameover-panel').classList.remove('visible');
  document.getElementById('pause-panel').classList.remove('visible');
}

function gameOver(){
  state.running=false;
  document.getElementById('go-score').textContent=Math.floor(state.score);
  document.getElementById('go-dist').textContent=Math.floor(state.distance);
  document.getElementById('go-coins').textContent=Math.floor(state.coins);
  const best=localStorage.getItem('motoBest')||0;
  const newBest=Math.max(state.score,best);
  localStorage.setItem('motoBest',Math.floor(newBest));
  localStorage.setItem('motoCoins',(+(localStorage.getItem('motoCoins')||0)+state.coins));
  document.getElementById('go-record').textContent=Math.floor(newBest);
  document.getElementById('gameover-panel').classList.add('visible');
}

function setupMenus(){
  document.getElementById('start-btn').addEventListener('click',startGame);
  document.getElementById('restart-btn').addEventListener('click',()=>{document.getElementById('gameover-panel').classList.remove('visible');startGame();});
  document.getElementById('menu-back').addEventListener('click',()=>{document.getElementById('gameover-panel').classList.remove('visible');document.getElementById('main-menu').classList.remove('hidden');});
  document.getElementById('settings-btn').addEventListener('click',()=>{document.getElementById('main-menu').classList.add('hidden');document.getElementById('settings-menu').classList.remove('hidden');});
  document.getElementById('settings-back').addEventListener('click',()=>{document.getElementById('settings-menu').classList.add('hidden');document.getElementById('main-menu').classList.remove('hidden');});
  document.getElementById('stats-btn').addEventListener('click',()=>{
    const best=localStorage.getItem('motoBest')||0;
    const coins=localStorage.getItem('motoCoins')||0;
    alert(`🏆 ESTADÍSTICAS\n\nMejor Puntaje: ${Math.floor(best)}\n💰 Monedas totales: ${Math.floor(coins)}`);
  });
  
  const ctrlToggle=document.getElementById('ctrl-toggle');
  ctrlToggle.addEventListener('click',()=>{
    settings.useButtons=!settings.useButtons;
    ctrlToggle.classList.toggle('active',settings.useButtons);
  });
  const nightToggle=document.getElementById('night-toggle');
  nightToggle.addEventListener('click',()=>{
    settings.nightMode=!settings.nightMode;
    nightToggle.classList.toggle('active',settings.nightMode);
  });
}

window.addEventListener('load',()=>{
  initThree();
  initControls();
  setupMenus();
  animate();
  document.getElementById('coin-count').textContent=localStorage.getItem('motoCoins')||0;
});
})();
</script>
