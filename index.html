<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff4400">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MotoRacer X">
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22:%22Moto%20Racer%20X%22,
    %22short_name%22:%22MotoRacer%22,
    %22start_url%22:%22/%22,
    %22display%22:%22standalone%22,
    %22theme_color%22:%22%23ff4400%22,
    %22background_color%22:%22%23000000%22,
    %22icons%22:[
      {%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23ff4400'/%3E%3Ctext x='256' y='380' font-size='320' text-anchor='middle' fill='white' font-weight='bold'%3EM%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22%7D
    ]
  }">
  <title>Moto Racer X - Carreras 3D</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
    body{overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif}
    canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
    
    /* HUD Minimalista */
    #hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
    #speed-panel{position:fixed;bottom:80px;left:15px;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);border-radius:20px;padding:6px 14px;border-left:3px solid #ff4400}
    #speed-val{font-size:42px;color:#ff4400;font-weight:900;font-family:monospace;line-height:1}
    #speed-unit{font-size:11px;color:#fff;opacity:.6}
    #coin-panel{position:fixed;top:12px;right:12px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border-radius:30px;padding:8px 16px;display:flex;align-items:center;gap:6px;font-weight:bold}
    #coin-icon{font-size:20px}
    #coin-count{color:gold;font-size:18px}
    #score-mini{position:fixed;top:12px;left:12px;background:rgba(0,0,0,.4);border-radius:20px;padding:5px 12px;font-size:12px;color:#fff;font-family:monospace}
    #weather-icon{position:fixed;top:12px;right:90px;font-size:24px;background:rgba(0,0,0,.4);border-radius:50%;padding:6px 10px}
    #combo-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;color:#f80;text-shadow:0 0 10px rgba(255,136,0,.8);pointer-events:none;opacity:0;transition:opacity .2s;z-index:15}
    
    /* Controles flotantes */
    #controls{position:fixed;bottom:15px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 15px;z-index:20;pointer-events:auto;transition:opacity .3s}
    .ctrl-btn{width:70px;height:70px;border-radius:35px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;transition:all .1s;color:#fff}
    .ctrl-btn:active{transform:scale(.92);background:rgba(255,68,0,.6)}
    .ctrl-center{display:flex;gap:12px}
    .ctrl-nitro{background:rgba(0,200,255,.3);border-color:#0ff}
    .ctrl-gas{background:rgba(255,68,0,.3);border-color:#f80}
    .pause-btn{position:fixed;top:15px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:none;color:#fff;font-size:20px;padding:6px 20px;border-radius:30px;cursor:pointer;z-index:30;pointer-events:auto}
    
    /* Menús */
    .menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(145deg,#050510,#0a0a2e);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;transition:all .4s;pointer-events:auto}
    .menu-overlay.hidden{opacity:0;pointer-events:none}
    .menu-title{font-size:44px;font-weight:900;color:#ff4400;text-shadow:0 0 30px rgba(255,68,0,.8);margin-bottom:10px}
    .menu-logo{font-size:70px;margin-bottom:5px}
    .menu-btn{background:linear-gradient(45deg,#ff4400,#f80);border:none;color:#fff;font-size:18px;padding:12px 35px;border-radius:50px;margin:8px;cursor:pointer;font-weight:bold;width:220px}
    .menu-btn.secondary{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}
    .settings-panel{background:rgba(0,0,0,.7);backdrop-filter:blur(10px);border-radius:24px;padding:20px;margin:15px;width:280px}
    .settings-row{display:flex;justify-content:space-between;align-items:center;margin:12px 0;color:#fff}
    .toggle-switch{width:50px;height:26px;background:#333;border-radius:13px;cursor:pointer;transition:.2s;position:relative}
    .toggle-switch.active{background:#ff4400}
    .toggle-switch::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:11px;top:2px;left:3px;transition:.2s}
    .toggle-switch.active::after{left:25px}
    .stat-value{color:#f80;font-weight:bold}
    
    #gameover-panel{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:90;opacity:0;pointer-events:none;transition:opacity .3s}
    #gameover-panel.visible{opacity:1;pointer-events:auto}
    #pause-panel{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:80;opacity:0;pointer-events:none;transition:opacity .3s}
    #pause-panel.visible{opacity:1;pointer-events:auto}
    
    @media(max-width:600px){.ctrl-btn{width:60px;height:60px;font-size:28px}.menu-title{font-size:32px}.ctrl-center{gap:8px}}
    @media(min-width:1024px){.ctrl-btn{width:80px;height:80px}}
    
    .hidden-ui{opacity:0.3}
    .damage-flash{animation:flash .15s 2}
    @keyframes flash{0%,100%{background:transparent}50%{background:rgba(255,0,0,.3)}}
    .coin-pickup{position:fixed;animation:floatUp 1s ease-out forwards;pointer-events:none;z-index:200;font-size:20px}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px)}}
  </style>
</head>
<body>

<!-- Menú Principal -->
<div id="main-menu" class="menu-overlay">
  <div class="menu-logo">🏍️</div>
  <div class="menu-title">MOTO RACER X</div>
  <div style="color:#fff;opacity:.7;font-size:13px;margin-bottom:30px">3D Highway Racing | Monedas | Obstáculos</div>
  <button class="menu-btn" id="start-btn">🚀 INICIAR</button>
  <button class="menu-btn secondary" id="settings-btn">⚙️ AJUSTES</button>
  <button class="menu-btn secondary" id="stats-main-btn">🏆 ESTADÍSTICAS</button>
</div>

<!-- Menú de Ajustes -->
<div id="settings-menu" class="menu-overlay hidden">
  <div class="menu-title" style="font-size:32px">⚙️ AJUSTES</div>
  <div class="settings-panel">
    <div class="settings-row">🎮 Controles<div id="ctrl-toggle" class="toggle-switch active"></div></div>
    <div class="settings-row" style="font-size:12px;opacity:.7" id="ctrl-desc">Botones táctiles</div>
    <div class="settings-row">🔊 Sonido<div id="sound-toggle" class="toggle-switch active"></div></div>
    <div class="settings-row">🌙 Modo noche<div id="night-toggle" class="toggle-switch"></div></div>
  </div>
  <button class="menu-btn secondary" id="settings-back-btn">◀ VOLVER</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="speed-panel"><div id="speed-val">0</div><div id="speed-unit">KM/H</div></div>
  <div id="coin-panel"><span id="coin-icon">💰</span><span id="coin-count">0</span></div>
  <div id="score-mini">🏆 <span id="score-mini-val">0</span></div>
  <div id="weather-icon">☀️</div>
  <div id="combo-pop"></div>
</div>

<!-- Controles táctiles -->
<div id="controls">
  <button class="ctrl-btn" id="ctrl-left">◀</button>
  <div class="ctrl-center">
    <button class="ctrl-btn ctrl-gas" id="ctrl-gas">⬆️</button>
    <button class="ctrl-btn ctrl-nitro" id="ctrl-nitro">💨</button>
  </div>
  <button class="ctrl-btn" id="ctrl-right">▶</button>
</div>

<button class="pause-btn" id="pause-btn-main">⏸ PAUSA</button>

<div id="combo-pop"></div>

<!-- Game Over -->
<div id="gameover-panel">
  <div style="font-size:48px;margin-bottom:10px">💥</div>
  <div style="font-size:32px;font-weight:900;color:#ff4400">GAME OVER</div>
  <div style="margin:20px;text-align:center;color:#fff;line-height:1.8">
    🏆 Puntaje: <span id="go-score">0</span><br>
    📍 Distancia: <span id="go-dist">0</span>m<br>
    💰 Monedas: <span id="go-coins">0</span><br>
    ⚡ Récord: <span id="go-record">0</span>
  </div>
  <button class="menu-btn" id="restart-btn">🔄 REINTENTAR</button>
  <button class="menu-btn secondary" id="menu-back-btn">🏠 MENÚ</button>
</div>

<!-- Pausa -->
<div id="pause-panel">
  <div style="font-size:48px;margin-bottom:10px">⏸</div>
  <div style="font-size:32px;font-weight:900;color:#fff">PAUSA</div>
  <button class="menu-btn" id="resume-btn">▶️ CONTINUAR</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
// ========== CONFIGURACIÓN ==========
const CONFIG={
  roadWidth:5.5,segLen:2.8,maxSpeed:360,baseAccel:0.72,nitroMult:2.2,
  nitroDrain:0.024,nitroRegen:0.012,turnBase:0.14,aiSpeed:140,
  numCars:10,numObstacles:8
};

// Estado del juego
let scene,camera,renderer,clock,bikeGroup,bikeBody,wheels=[];
let roadLines=[],cars=[],obstacles=[],coins=[];
let rain,stars,ambLight,sunLight;
let state={
  running:false,paused:false,speed:80,nitro:0.8,bikeX:0,bikeXVel:0,
  score:0,coins:0,distance:0,maxSpeed:0,combo:1,weather:'clear',
  timeOfDay:0.6,drift:0,invincible:0
};
let keys={left:false,right:false,up:false,down:false,nitro:false};
let settings={useButtons:true,useSound:true,nightMode:false};
let exhaustParticles=[];
let lastFrameTime=0;

// ========== THREE.JS INICIALIZACIÓN ==========
function initThree(){
  clock=new THREE.Clock();
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0a1030);
  scene.fog=new THREE.FogExp2(0x0a1030,0.012);
  camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,500);
  camera.position.set(0,2.4,5.2);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;
  document.body.appendChild(renderer.domElement);
  
  ambLight=new THREE.AmbientLight(0x303060,0.7);
  scene.add(ambLight);
  sunLight=new THREE.DirectionalLight(0xffcc88,1.8);
  sunLight.position.set(8,12,10);
  sunLight.castShadow=true;
  scene.add(sunLight);
  
  buildRoad();
  buildBike();
  buildTraffic();
  buildObstacles();
  buildCoins();
  buildEnvironment();
  buildWeather();
}

function buildRoad(){
  const roadMat=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.6});
  for(let i=-40;i<40;i++){
    const seg=new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.roadWidth,CONFIG.segLen),roadMat);
    seg.rotation.x=-Math.PI/2;seg.position.set(0,-0.08,i*CONFIG.segLen);seg.receiveShadow=true;
    scene.add(seg);
  }
  const lineMat=new THREE.MeshStandardMaterial({color:0xffcc00,emissive:0x442200});
  for(let i=-40;i<40;i++){
    const center=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.05,0.7),lineMat);
    center.position.set(0,-0.04,i*CONFIG.segLen);scene.add(center);roadLines.push(center);
    const left=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.05,CONFIG.segLen),new THREE.MeshStandardMaterial({color:0xffffff}));
    left.position.set(-CONFIG.roadWidth/2+0.2,-0.04,i*CONFIG.segLen);scene.add(left);
    const right=left.clone();right.position.x=CONFIG.roadWidth/2-0.2;scene.add(right);
  }
}

function buildBike(){
  bikeGroup=new THREE.Group();
  bikeBody=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.32,1.85),new THREE.MeshStandardMaterial({color:0xff4400,metalness:0.85,roughness:0.2,emissive:0xff2200,emissiveIntensity:0.05}));
  bikeBody.position.y=0.2;bikeBody.castShadow=true;bikeGroup.add(bikeBody);
  const seat=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.12,0.75),new THREE.MeshStandardMaterial({color:0x222222}));
  seat.position.set(0,0.43,-0.4);bikeGroup.add(seat);
  const wheelMat=new THREE.MeshStandardMaterial({color:0x111111,roughness:0.4});
  const wheelGeo=new THREE.CylinderGeometry(0.34,0.34,0.5,16);
  [-0.5,0.5].forEach(x=>{
    const fw=new THREE.Mesh(wheelGeo,wheelMat);fw.rotation.z=Math.PI/2;fw.position.set(x,0.12,0.85);fw.castShadow=true;bikeGroup.add(fw);wheels.push(fw);
    const rw=new THREE.Mesh(wheelGeo,wheelMat);rw.rotation.z=Math.PI/2;rw.position.set(x,0.12,-0.88);rw.castShadow=true;bikeGroup.add(rw);wheels.push(rw);
  });
  scene.add(bikeGroup);
}

function buildTraffic(){
  const colors=[0xcc3333,0x2266cc,0x33aa44,0xeebb22,0x9933cc];
  for(let i=0;i<CONFIG.numCars;i++){
    const g=new THREE.Group();
    const body=new THREE.Mesh(new THREE.BoxGeometry(0.85,0.42,1.6),new THREE.MeshStandardMaterial({color:colors[i%5],metalness:0.5}));
    body.castShadow=true;g.add(body);
    const roof=new THREE.Mesh(new THREE.BoxGeometry(0.65,0.28,0.95),new THREE.MeshStandardMaterial({color:0x333333}));
    roof.position.y=0.35;g.add(roof);
    const lane=(Math.floor(Math.random()*3)-1)*(CONFIG.roadWidth/3);
    g.position.set(lane,0.2,-35-i*22);
    scene.add(g);
    cars.push({obj:g,speed:CONFIG.aiSpeed+Math.random()*70,lane});
  }
}

function buildObstacles(){
  for(let i=0;i<CONFIG.numObstacles;i++){
    const group=new THREE.Group();
    const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.32,0.55,8),new THREE.MeshStandardMaterial({color:0xcc6600,roughness:0.7}));
    barrel.castShadow=true;group.add(barrel);
    const band=new THREE.Mesh(new THREE.TorusGeometry(0.3,0.05,8,20),new THREE.MeshStandardMaterial({color:0xdd3333}));
    band.rotation.x=Math.PI/2;band.position.y=0.1;group.add(band);
    const lane=(Math.floor(Math.random()*3)-1)*(CONFIG.roadWidth/3);
    group.position.set(lane,0.2,-45-i*35);
    scene.add(group);
    obstacles.push({obj:group,lane,type:'barrel',hit:false});
  }
}

function buildCoins(){
  for(let i=0;i<25;i++){
    const coinGroup=new THREE.Group();
    const coinBody=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,0.05,12),new THREE.MeshStandardMaterial({color:0xffcc00,metalness:0.9,emissive:0xffaa00,emissiveIntensity:0.5}));
    coinBody.rotation.x=Math.PI/2;coinGroup.add(coinBody);
    const lane=(Math.floor(Math.random()*3)-1)*(CONFIG.roadWidth/3)+(Math.random()-0.5)*0.8;
    coinGroup.position.set(lane,0.25,-50-i*18);
    coinGroup.userData={value:10};
    scene.add(coinGroup);
    coins.push(coinGroup);
  }
}

function buildEnvironment(){
  const starGeo=new THREE.BufferGeometry();
  const starPos=[];
  for(let i=0;i<800;i++){starPos.push((Math.random()-.5)*300);starPos.push(15+Math.random()*45);starPos.push((Math.random()-.5)*150-50);}
  starGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(starPos),3));
  stars=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.1}));
  scene.add(stars);
}

function buildWeather(){
  const N=1000,geo=new THREE.BufferGeometry(),pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){pos[i*3]=(Math.random()-.5)*50;pos[i*3+1]=Math.random()*14;pos[i*3+2]=(Math.random()-.5)*60-25;}
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  rain=new THREE.Points(geo,new THREE.PointsMaterial({color:0x88aaff,size:0.06,transparent:true,opacity:0}));
  scene.add(rain);
}

// ========== FÍSICA ==========
function updatePhysics(dt){
  if(!state.running||state.paused)return;
  const useNitro=keys.nitro&&state.nitro>0.05;
  if(keys.up){
    let accel=CONFIG.baseAccel;
    if(useNitro){accel*=CONFIG.nitroMult;state.nitro=Math.max(0,state.nitro-CONFIG.nitroDrain);bikeBody.material.emissiveIntensity=0.35;}
    else bikeBody.material.emissiveIntensity=0.05;
    state.speed=Math.min(CONFIG.maxSpeed,state.speed+accel);
  }else{state.speed=Math.max(45,state.speed*(1-dt*0.45));}
  if(keys.down)state.speed=Math.max(25,state.speed-CONFIG.baseAccel*1.3);
  if(!useNitro)state.nitro=Math.min(1,state.nitro+CONFIG.nitroRegen*dt*60);
  
  const turn=CONFIG.turnBase*(0.5+state.speed/CONFIG.maxSpeed*0.6);
  if(keys.left){state.bikeXVel-=turn*dt*60;state.drift=Math.max(-1,state.drift-dt*2);}
  else if(keys.right){state.bikeXVel+=turn*dt*60;state.drift=Math.min(1,state.drift+dt*2);}
  else state.drift*=0.95;
  state.bikeXVel*=0.92;
  state.bikeX=Math.max(-2.8,Math.min(2.8,state.bikeX+state.bikeXVel*dt*60));
  bikeGroup.position.x=state.bikeX;
  bikeGroup.rotation.z=-state.drift*0.2;
  wheels.forEach(w=>w.rotation.x+=state.speed*0.045*dt*60);
  
  camera.position.x+=(state.bikeX*0.4-camera.position.x)*0.08;
  camera.position.z=5.1-(state.speed/CONFIG.maxSpeed)*1.0;
  camera.lookAt(state.bikeX*0.6,0.6,-6);
  
  const scroll=state.speed*0.22*dt;
  roadLines.forEach(l=>{l.position.z+=scroll;if(l.position.z>8)l.position.z-=240;});
  
  // Tráfico
  cars.forEach(c=>{
    c.obj.position.z+=(state.speed-c.speed)*dt*0.8+scroll*0.7;
    if(c.obj.position.z>15){c.obj.position.z=-60-Math.random()*40;c.lane=(Math.floor(Math.random()*3)-1)*(CONFIG.roadWidth/3);c.obj.position.x=c.lane;}
    if(state.invincible<=0){
      const dx=Math.abs(c.obj.position.x-state.bikeX),dz=Math.abs(c.obj.position.z+0.6);
      if(dx<1.0&&dz<1.3){state.speed*=0.55;state.score=Math.max(0,state.score-150);state.combo=1;state.invincible=1.2;document.body.classList.add('damage-flash');setTimeout(()=>document.body.classList.remove('damage-flash'),200);c.obj.position.z+=3;}
    }
  });
  
  // Obstáculos (dan -monedas)
  obstacles.forEach(o=>{
    o.obj.position.z+=scroll;
    if(o.obj.position.z>15){o.obj.position.z=-70-Math.random()*50;o.lane=(Math.floor(Math.random()*3)-1)*(CONFIG.roadWidth/3);o.obj.position.x=o.lane;o.hit=false;}
    if(!o.hit&&state.invincible<=0){
      const dx=Math.abs(o.obj.position.x-state.bikeX),dz=Math.abs(o.obj.position.z+0.4);
      if(dx<0.9&&dz<0.9){state.coins=Math.max(0,state.coins-25);o.hit=true;showFloatingText("-💰25",o.obj.position.x,1);state.speed*=0.85;}
    }
  });
  
  // Monedas
  coins.forEach(c=>{
    c.position.z+=scroll;
    c.rotation.y+=0.1;
    if(c.position.z>12){c.position.z=-80-Math.random()*60;c.position.x=(Math.floor(Math.random()*3)-1)*(CONFIG.roadWidth/3)+(Math.random()-0.5)*0.8;}
    const dx=Math.abs(c.position.x-state.bikeX),dz=Math.abs(c.position.z+0.3);
    if(dx<0.8&&dz<0.9){
      state.coins+=c.userData.value;state.score+=50;showFloatingText("+💰"+c.userData.value,c.position.x,2);
      c.position.z=-100;c.position.x=(Math.floor(Math.random()*3)-1)*(CONFIG.roadWidth/3);
    }
  });
  
  state.distance+=state.speed*dt;
  state.score+=state.speed*dt*0.8*state.combo;
  state.maxSpeed=Math.max(state.maxSpeed,state.speed);
  state.combo=Math.max(1,state.combo+dt*0.3);
  if(state.invincible>0)state.invincible-=dt;
  
  updateHUD();
}

function showFloatingText(text,x,yOffset){
  const div=document.createElement('div');
  div.textContent=text;
  div.style.position='fixed';
  div.style.left=(innerWidth/2+(x/innerWidth*100))+'%';
  div.style.top=innerHeight/2+'px';
  div.style.color='#ffcc00';
  div.style.fontWeight='bold';
  div.style.fontSize='20px';
  div.style.pointerEvents='none';
  div.style.zIndex='200';
  div.style.textShadow='0 0 5px black';
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),800);
  let y=0;
  const anim=setInterval(()=>{y+=2;div.style.top=(innerHeight/2-50-y)+'px';if(y>80)clearInterval(anim);},16);
}

function updateWeather(dt){
  if(Math.random()<0.002){
    const types=['clear','clear','rain','fog'];
    state.weather=types[Math.floor(Math.random()*types.length)];
    const icons={clear:'☀️',rain:'🌧️',fog:'🌫️'};
    document.getElementById('weather-icon').textContent=icons[state.weather];
    if(state.weather==='rain'){rain.material.opacity=0.6;scene.fog.density=0.022;}
    else if(state.weather==='fog'){rain.material.opacity=0;scene.fog.density=0.045;}
    else{rain.material.opacity=0;scene.fog.density=0.012;}
  }
  if(state.weather==='rain')rain.rotation.y+=0.02;
  state.timeOfDay+=dt*0.0008;
  if(state.timeOfDay>1)state.timeOfDay=0;
  const intensity=0.3+Math.sin(state.timeOfDay*Math.PI)*0.9;
  sunLight.intensity=intensity*(settings.nightMode?0.5:1);
}

function updateHUD(){
  document.getElementById('speed-val').textContent=Math.floor(state.speed);
  document.getElementById('coin-count').textContent=Math.floor(state.coins);
  document.getElementById('score-mini-val').textContent=Math.floor(state.score);
  document.getElementById('nitro-fill')?.setAttribute?.('style',`width:${state.nitro*100}%`);
  const comboDiv=document.getElementById('combo-pop');
  if(state.combo>1.5){comboDiv.textContent=`🔥 COMBO x${state.combo.toFixed(1)} 🔥`;comboDiv.style.opacity='0.8';setTimeout(()=>comboDiv.style.opacity='0',300);}
}

function spawnExhaust(){
  if(!state.running||state.paused||state.speed<80)return;
  const p=new THREE.Mesh(new THREE.SphereGeometry(0.06,4),new THREE.MeshStandardMaterial({color:keys.nitro?0x00ffff:0xff6600,emissive:keys.nitro?0x00ffff:0xff3300}));
  p.position.set(state.bikeX+(Math.random()-.5)*0.3,0.12,-1.1);
  scene.add(p);
  exhaustParticles.push({mesh:p,life:1});
}

function updateExhaust(dt){
  for(let i=exhaustParticles.length-1;i>=0;i--){
    exhaustParticles[i].life-=dt*2.5;
    exhaustParticles[i].mesh.material.opacity=exhaustParticles[i].life;
    if(exhaustParticles[i].life<=0){scene.remove(exhaustParticles[i].mesh);exhaustParticles.splice(i,1);}
  }
}

let lastExhaust=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.033);
  updatePhysics(dt);
  updateWeather(dt);
  updateExhaust(dt);
  lastExhaust+=dt;
  if(lastExhaust>0.045){spawnExhaust();lastExhaust=0;}
  if(stars)stars.rotation.y+=dt*0.0003;
  renderer.render(scene,camera);
}

// ========== CONTROLES ==========
function initControls(){
  // Teclado
  window.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')keys.left=true;
    if(e.key==='ArrowRight')keys.right=true;
    if(e.key==='ArrowUp')keys.up=true;
    if(e.key==='ArrowDown')keys.down=true;
    if(e.key===' '){{e.preventDefault();keys.nitro=true;}}
    if(e.key==='p')togglePause();
  });
  window.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft')keys.left=false;
    if(e.key==='ArrowRight')keys.right=false;
    if(e.key==='ArrowUp')keys.up=false;
    if(e.key==='ArrowDown')keys.down=false;
    if(e.key===' ')keys.nitro=false;
  });
  
  function bindBtn(id,onPress,onRelease){
    const btn=document.getElementById(id);
    if(!btn)return;
    const start=(e)=>{e.preventDefault();onPress();btn.style.transform='scale(0.92)';};
    const end=(e)=>{e.preventDefault();onRelease();btn.style.transform='scale(1)';};
    btn.addEventListener('mousedown',start);
    btn.addEventListener('mouseup',end);
    btn.addEventListener('mouseleave',end);
    btn.addEventListener('touchstart',start,{passive:false});
    btn.addEventListener('touchend',end);
    btn.addEventListener('touchcancel',end);
  }
  bindBtn('ctrl-left',()=>keys.left=true,()=>keys.left=false);
  bindBtn('ctrl-right',()=>keys.right=true,()=>keys.right=false);
  bindBtn('ctrl-gas',()=>keys.up=true,()=>keys.up=false);
  bindBtn('ctrl-nitro',()=>keys.nitro=true,()=>keys.nitro=false);
  
  // Giroscopio
  if(window.DeviceOrientationEvent){
    window.addEventListener('deviceorientation',e=>{
      if(!settings.useButtons&&state.running&&!state.paused&&e.gamma!=null){
        keys.left=e.gamma<-8;
        keys.right=e.gamma>8;
      }
    });
  }
  
  document.getElementById('pause-btn-main').addEventListener('click',togglePause);
  document.getElementById('resume-btn').addEventListener('click',togglePause);
}

function togglePause(){
  if(!state.running)return;
  state.paused=!state.paused;
  document.getElementById('pause-panel').classList.toggle('visible',state.paused);
}

function startGame(){
  state={...state,running:true,paused:false,speed:80,nitro:0.8,bikeX:0,bikeXVel:0,score:0,coins:0,distance:0,maxSpeed:0,combo:1,invincible:0};
  bikeGroup.position.x=0;
  keys.up=true;
  document.getElementById('main-menu').classList.add('hidden');
  document.getElementById('gameover-panel').classList.remove('visible');
  document.getElementById('pause-panel').classList.remove('visible');
}

function gameOver(){
  state.running=false;
  document.getElementById('go-score').textContent=Math.floor(state.score);
  document.getElementById('go-dist').textContent=Math.floor(state.distance);
  document.getElementById('go-coins').textContent=Math.floor(state.coins);
  const best=localStorage.getItem('motoBest')||0;
  const newBest=Math.max(state.score,best);
  localStorage.setItem('motoBest',Math.floor(newBest));
  localStorage.setItem('motoCoins',(+(localStorage.getItem('motoCoins')||0)+state.coins));
  document.getElementById('go-record').textContent=Math.floor(newBest);
  document.getElementById('gameover-panel').classList.add('visible');
}

// ========== MENÚS Y AJUSTES ==========
function setupMenus(){
  document.getElementById('start-btn').addEventListener('click',startGame);
  document.getElementById('restart-btn').addEventListener('click',()=>{document.getElementById('gameover-panel').classList.remove('visible');startGame();});
  document.getElementById('menu-back-btn').addEventListener('click',()=>{document.getElementById('gameover-panel').classList.remove('visible');document.getElementById('main-menu').classList.remove('hidden');});
  document.getElementById('settings-btn').addEventListener('click',()=>{document.getElementById('main-menu').classList.add('hidden');document.getElementById('settings-menu').classList.remove('hidden');});
  document.getElementById('settings-back-btn').addEventListener('click',()=>{document.getElementById('settings-menu').classList.add('hidden');document.getElementById('main-menu').classList.remove('hidden');});
  document.getElementById('stats-main-btn').addEventListener('click',()=>{
    const best=localStorage.getItem('motoBest')||0;
    const coins=localStorage.getItem('motoCoins')||0;
    alert(`🏆 ESTADÍSTICAS\n\nMejor Puntaje: ${Math.floor(best)}\n💰 Monedas totales: ${Math.floor(coins)}\n🚀 Sigue jugando!`);
  });
  
  const ctrlToggle=document.getElementById('ctrl-toggle');
  ctrlToggle.addEventListener('click',()=>{
    settings.useButtons=!settings.useButtons;
    ctrlToggle.classList.toggle('active',settings.useButtons);
    document.getElementById('ctrl-desc').textContent=settings.useButtons?'Botones táctiles visibles':'Giroscopio (inclina el móvil)';
    document.getElementById('controls').style.opacity=settings.useButtons?'1':'0.3';
  });
  const nightToggle=document.getElementById('night-toggle');
  nightToggle.addEventListener('click',()=>{
    settings.nightMode=!settings.nightMode;
    nightToggle.classList.toggle('active',settings.nightMode);
    ambLight.intensity=settings.nightMode?0.3:0.7;
  });
}

let deathTimer;
function loopGame(){
  if(state.running){
    if(state.speed<10&&state.distance>20)gameOver();
  }
  requestAnimationFrame(loopGame);
}
// Inicialización
window.addEventListener('load',()=>{
  initThree();
  initControls();
  setupMenus();
  animate();
  loopGame();
  document.getElementById('best-val')?.remove();
  const savedCoins=localStorage.getItem('motoCoins')||0;
  document.getElementById('coin-count').textContent=savedCoins;
});
})();
</script>
