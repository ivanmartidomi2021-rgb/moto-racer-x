<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4400">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Moto Racer X - Móvil</title>
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22:%22Moto%20Racer%20X%22,
    %22short_name%22:%22MotoRacer%22,
    %22start_url%22:%22/%22,
    %22display%22:%22standalone%22,
    %22orientation%22:%22landscape%22,
    %22theme_color%22:%22%23ff4400%22,
    %22background_color%22:%22%23000000%22,
    %22icons%22:[
      {%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23ff4400'/%3E%3Ctext x='256' y='380' font-size='320' text-anchor='middle' fill='white' font-weight='bold'%3EM%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22%7D
    ]
  }">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
    body{overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif;touch-action:none}
    canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
    
    /* HUD Móvil Horizontal */
    #hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
    
    /* Velocímetro */
    #speed-panel{position:fixed;bottom:15px;left:10px;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);border-radius:12px;padding:4px 10px;border-left:3px solid #ff4400}
    #speed-val{font-size:32px;color:#ff4400;font-weight:900;font-family:monospace;line-height:1}
    #speed-unit{font-size:8px;color:#fff;opacity:.6}
    
    /* Vidas */
    #lives-panel{position:fixed;top:8px;left:8px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border-radius:15px;padding:4px 10px;display:flex;gap:3px;font-size:16px}
    .heart{color:#ff3366}
    .heart.lost{opacity:0.2}
    
    /* Monedas y Score */
    #coin-panel{position:fixed;top:8px;right:8px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border-radius:15px;padding:4px 10px;display:flex;align-items:center;gap:4px}
    #coin-count{color:gold;font-size:14px;font-weight:bold}
    #score-panel{position:fixed;top:45px;right:8px;background:rgba(0,0,0,.4);border-radius:10px;padding:2px 8px;font-size:9px;color:#fff}
    #weather-icon{position:fixed;top:8px;right:85px;font-size:18px;background:rgba(0,0,0,.4);border-radius:50%;padding:3px 6px}
    
    /* Combo */
    #combo-pop{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);font-size:24px;font-weight:900;color:#ff8800;text-shadow:0 0 15px rgba(255,136,0,.8);pointer-events:none;opacity:0;transition:opacity .2s;z-index:15;white-space:nowrap}
    
    /* CONTROLES MÓVIL - PEDALES REALES */
    #controls-container{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;gap:6px;padding:8px 10px 15px;z-index:20;pointer-events:auto;background:linear-gradient(to top,rgba(0,0,0,.5),transparent)}
    
    /* Volante */
    .steering-wheel{width:85px;height:85px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#3a3a3a,#1a1a1a);border:2px solid #ff4400;box-shadow:0 4px 12px rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative}
    .steering-wheel:active{transform:scale(0.96)}
    .wheel-icon{font-size:28px;color:#ff4400}
    .wheel-label{font-size:7px;color:#fff;opacity:.7}
    .wheel-arrows{position:absolute;width:100%;display:flex;justify-content:space-between;padding:0 8px;top:50%;transform:translateY(-50%);pointer-events:none}
    .wheel-arrows span{font-size:14px;color:#ff4400;opacity:.6}
    
    /* Pedales */
    .pedals-container{display:flex;gap:6px}
    .real-pedal{width:60px;height:75px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .05s linear;box-shadow:0 4px 10px rgba(0,0,0,.5);position:relative}
    .real-pedal:active{transform:scale(0.93)}
    .gas-pedal-real{background:linear-gradient(145deg,#c0c0c0,#a0a0a0);border-bottom:3px solid #00aa44}
    .gas-pedal-real .pedal-symbol{font-size:24px;color:#00aa44}
    .brake-pedal-real{background:linear-gradient(145deg,#888,#666);border-bottom:3px solid #cc0000}
    .brake-pedal-real .pedal-symbol{font-size:24px;color:#cc0000}
    .pedal-label-real{font-size:7px;font-weight:bold;color:#333;margin-top:3px}
    
    /* Nitro */
    .nitro-btn-real{width:55px;height:55px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#0088dd,#0044aa);box-shadow:0 0 8px #0088ff;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
    .nitro-btn-real:active{transform:scale(0.92);background:#00aaff}
    .nitro-icon{font-size:24px}
    .nitro-label{font-size:7px;color:#fff;margin-top:2px}
    
    /* Pausa */
    .pause-btn{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:10px;padding:3px 18px;border-radius:18px;cursor:pointer;z-index:30;pointer-events:auto}
    
    /* Menús */
    .menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(145deg,#050510,#0a0a2e,#000);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;transition:all .4s}
    .menu-overlay.hidden{opacity:0;pointer-events:none}
    .menu-title{font-size:32px;font-weight:900;color:#ff4400;text-shadow:0 0 20px rgba(255,68,0,.8);margin-bottom:5px}
    .menu-logo{font-size:55px;margin-bottom:5px;animation:float 2s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .menu-btn{background:linear-gradient(45deg,#ff4400,#ff8800);border:none;color:#fff;font-size:14px;padding:8px 25px;border-radius:35px;margin:4px;cursor:pointer;font-weight:bold;width:180px}
    .menu-btn:active{transform:scale(0.96)}
    .menu-btn.secondary{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}
    
    .settings-panel{background:rgba(0,0,0,.8);backdrop-filter:blur(20px);border-radius:18px;padding:12px;margin:12px;width:240px}
    .settings-row{display:flex;justify-content:space-between;align-items:center;margin:8px 0;color:#fff;font-size:12px}
    .toggle-switch{width:40px;height:22px;background:#333;border-radius:11px;cursor:pointer;position:relative}
    .toggle-switch.active{background:#ff4400}
    .toggle-switch::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:9px;top:2px;left:2px;transition:.2s}
    .toggle-switch.active::after{left:20px}
    
    #gameover-panel,#pause-panel{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);backdrop-filter:blur(10px);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:90;opacity:0;pointer-events:none;transition:opacity .3s}
    #gameover-panel.visible,#pause-panel.visible{opacity:1;pointer-events:auto}
    
    .damage-flash{animation:damageFlash .2s 2}
    @keyframes damageFlash{0%,100%{background:transparent}50%{background:rgba(255,0,0,.4)}}
    .coin-pop{position:fixed;animation:coinFloat 1s ease-out forwards;pointer-events:none;z-index:200;font-size:16px;font-weight:bold}
    @keyframes coinFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
    
    @media(max-width:600px) and (orientation:landscape){
      .steering-wheel{width:75px;height:75px}
      .real-pedal{width:55px;height:68px}
      .real-pedal .pedal-symbol{font-size:22px}
      .nitro-btn-real{width:50px;height:50px}
      .nitro-icon{font-size:22px}
      #speed-val{font-size:28px}
    }
  </style>
</head>
<body>

<div id="main-menu" class="menu-overlay">
  <div class="menu-logo">🏍️</div>
  <div class="menu-title">MOTO RACER X</div>
  <div style="color:#fff;opacity:.7;font-size:10px;margin-bottom:15px">3 Carriles | Controles Reales</div>
  <button class="menu-btn" id="start-btn">🚀 INICIAR</button>
  <button class="menu-btn secondary" id="settings-btn">⚙️ AJUSTES</button>
  <button class="menu-btn secondary" id="stats-btn">🏆 ESTADÍSTICAS</button>
</div>

<div id="settings-menu" class="menu-overlay hidden">
  <div class="menu-title" style="font-size:24px">⚙️ AJUSTES</div>
  <div class="settings-panel">
    <div class="settings-row">🎮 Controles táctiles<div id="ctrl-toggle" class="toggle-switch active"></div></div>
    <div class="settings-row">🌙 Modo noche<div id="night-toggle" class="toggle-switch"></div></div>
  </div>
  <button class="menu-btn secondary" id="settings-back">◀ VOLVER</button>
</div>

<div id="gameover-panel">
  <div style="font-size:45px">💀</div>
  <div style="font-size:26px;font-weight:900;color:#ff4400">GAME OVER</div>
  <div style="margin:15px;text-align:center;color:#fff;line-height:1.5;font-size:12px">
    🏆 Puntaje: <span id="go-score">0</span><br>
    📍 Distancia: <span id="go-dist">0</span>m<br>
    💰 Monedas: <span id="go-coins">0</span><br>
    ⚡ Récord: <span id="go-record">0</span>
  </div>
  <button class="menu-btn" id="restart-btn">🔄 REINTENTAR</button>
  <button class="menu-btn secondary" id="menu-back">🏠 MENÚ</button>
</div>

<div id="pause-panel">
  <div style="font-size:45px">⏸️</div>
  <div style="font-size:26px;font-weight:900;color:#fff">PAUSA</div>
  <button class="menu-btn" id="resume-btn">▶️ CONTINUAR</button>
</div>

<div id="hud">
  <div id="speed-panel">
    <div id="speed-val">0</div>
    <div id="speed-unit">KM/H</div>
  </div>
  <div id="lives-panel">❤️❤️❤️</div>
  <div id="coin-panel"><span>💰</span><span id="coin-count">0</span></div>
  <div id="score-panel">🏆 <span id="score-val">0</span></div>
  <div id="weather-icon">☀️</div>
  <div id="combo-pop"></div>
</div>

<!-- CONTROLES MÓVIL -->
<div id="controls-container">
  <div class="steering-wheel" id="steering-wheel">
    <div class="wheel-icon">🚗</div>
    <div class="wheel-label">VOLANTE</div>
    <div class="wheel-arrows"><span>◀</span><span>▶</span></div>
  </div>
  
  <div class="pedals-container">
    <div class="real-pedal gas-pedal-real" id="gas-pedal">
      <div class="pedal-symbol">⏺</div>
      <div class="pedal-label-real">ACELERAR</div>
    </div>
    <div class="real-pedal brake-pedal-real" id="brake-pedal">
      <div class="pedal-symbol">●</div>
      <div class="pedal-label-real">FRENAR</div>
    </div>
  </div>
  
  <div class="nitro-btn-real" id="nitro-btn">
    <div class="nitro-icon">💨</div>
    <div class="nitro-label">NITRO</div>
  </div>
</div>

<button class="pause-btn" id="pause-main">⏸ PAUSA</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
// ========== CONFIGURACIÓN MÓVIL - VELOCIDAD REDUCIDA ==========
const CONFIG={
  roadWidth:9.0,
  segLen:2.6,
  maxSpeed:160,           // Velocidad máxima reducida para móvil
  baseAccel:0.45,         // Aceleración suave
  nitroMult:1.7,          // Nitro más suave
  nitroDrain:0.018,
  nitroRegen:0.018,
  turnBase:0.12,          // Giro suave
  aiSpeed:95,             // Autos más lentos
  numCars:8,
  numObstacles:6,
  numCoins:20,
  roadLeftLimit:-3.8,
  roadRightLimit:3.8,
  lanes:[-2.6, 0, 2.6]
};

let scene,camera,renderer,clock,bikeGroup,bikeBody,wheels=[],frontLight;
let roadLines=[],cars=[],obstacles=[],coins=[],decorations=[];
let rain,stars,ambLight,sunLight;
let state={
  running:false,paused:false,speed:50,nitro:0.8,bikeX:0,bikeXVel:0,
  score:0,coins:0,lives:3,distance:0,maxSpeed:0,combo:1,
  weather:'clear',timeOfDay:0.6,drift:0,invincible:0
};
let keys={left:false,right:false,up:true,down:false,nitro:false}; // up=true para autoacelerar
let settings={useButtons:true,nightMode:false};
let exhaustParticles=[];
let lastExhaust=0;

// ========== THREE.JS ==========
function initThree(){
  clock=new THREE.Clock();
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0a1030);
  scene.fog=new THREE.FogExp2(0x0a1030,0.012);
  
  camera=new THREE.PerspectiveCamera(65,window.innerWidth/window.innerHeight,0.1,500);
  camera.position.set(0,2.4,5.2);
  
  renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.shadowMap.enabled=true;
  document.body.appendChild(renderer.domElement);
  
  ambLight=new THREE.AmbientLight(0x303060,0.7);
  scene.add(ambLight);
  sunLight=new THREE.DirectionalLight(0xffcc88,1.4);
  sunLight.position.set(8,15,10);
  sunLight.castShadow=true;
  scene.add(sunLight);
  
  buildRoad3Lanes();
  buildBike();
  buildTraffic();
  buildObstacles();
  buildCoins();
  buildDecorations();
  buildEnvironment();
  buildWeather();
}

// CARRETERA DE 3 CARRILES
function buildRoad3Lanes(){
  const asphaltMat=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.7});
  for(let i=-50;i<50;i++){
    const seg=new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.roadWidth,CONFIG.segLen),asphaltMat);
    seg.rotation.x=-Math.PI/2;seg.position.set(0,-0.08,i*CONFIG.segLen);seg.receiveShadow=true;
    scene.add(seg);
  }
  
  const lineMat=new THREE.MeshStandardMaterial({color:0xffcc44,emissive:0x442200});
  for(let i=-50;i<50;i++){
    // Línea central
    const centerLine=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.06,0.9),lineMat);
    centerLine.position.set(0,-0.04,i*CONFIG.segLen);scene.add(centerLine);roadLines.push(centerLine);
    
    // Línea izquierda
    const leftDivider=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.06,0.9),lineMat);
    leftDivider.position.set(-2.8,-0.04,i*CONFIG.segLen);scene.add(leftDivider);roadLines.push(leftDivider);
    
    // Línea derecha
    const rightDivider=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.06,0.9),lineMat);
    rightDivider.position.set(2.8,-0.04,i*CONFIG.segLen);scene.add(rightDivider);roadLines.push(rightDivider);
    
    // Bordes
    const leftEdge=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.06,CONFIG.segLen),new THREE.MeshStandardMaterial({color:0xffaa66}));
    leftEdge.position.set(-CONFIG.roadWidth/2+0.25,-0.04,i*CONFIG.segLen);scene.add(leftEdge);
    const rightEdge=leftEdge.clone();rightEdge.position.x=CONFIG.roadWidth/2-0.25;scene.add(rightEdge);
  }
}

function buildBike(){
  bikeGroup=new THREE.Group();
  const bodyMat=new THREE.MeshStandardMaterial({color:0xff4400,metalness:0.85,roughness:0.25});
  bikeBody=new THREE.Mesh(new THREE.BoxGeometry(0.68,0.3,1.75),bodyMat);
  bikeBody.position.y=0.2;bikeBody.castShadow=true;bikeGroup.add(bikeBody);
  
  const seat=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.12,0.7),new THREE.MeshStandardMaterial({color:0x111111}));
  seat.position.set(0,0.42,-0.38);bikeGroup.add(seat);
  
  const wheelMat=new THREE.MeshStandardMaterial({color:0x111111,roughness:0.5});
  const wheelGeo=new THREE.CylinderGeometry(0.32,0.32,0.48,18);
  [-0.48,0.48].forEach(x=>{
    const fw=new THREE.Mesh(wheelGeo,wheelMat);fw.rotation.z=Math.PI/2;fw.position.set(x,0.12,0.82);fw.castShadow=true;bikeGroup.add(fw);wheels.push(fw);
    const rw=new THREE.Mesh(wheelGeo,wheelMat);rw.rotation.z=Math.PI/2;rw.position.set(x,0.12,-0.85);rw.castShadow=true;bikeGroup.add(rw);wheels.push(rw);
  });
  
  frontLight=new THREE.SpotLight(0xffcc88,2,20,Math.PI/6,0.5);
  frontLight.position.set(0,0.45,1.05);frontLight.target.position.set(0,-0.3,-8);
  bikeGroup.add(frontLight);bikeGroup.add(frontLight.target);
  
  scene.add(bikeGroup);
}

function buildTraffic(){
  const colors=[0xcc3333,0x2266cc,0x33aa44,0xeebb22,0x9933cc];
  for(let i=0;i<CONFIG.numCars;i++){
    const g=new THREE.Group();
    const body=new THREE.Mesh(new THREE.BoxGeometry(0.82,0.4,1.55),new THREE.MeshStandardMaterial({color:colors[i%5],metalness:0.5}));
    body.castShadow=true;g.add(body);
    const roof=new THREE.Mesh(new THREE.BoxGeometry(0.62,0.26,0.9),new THREE.MeshStandardMaterial({color:0x2a2a2a}));
    roof.position.y=0.34;g.add(roof);
    const wheelGeom=new THREE.SphereGeometry(0.16,8);
    const wheelMat=new THREE.MeshStandardMaterial({color:0x111111});
    [[-0.5,0.1,-0.62],[0.5,0.1,-0.62],[-0.5,0.1,0.62],[0.5,0.1,0.62]].forEach(p=>{
      const w=new THREE.Mesh(wheelGeom,wheelMat);w.position.set(p[0],p[1],p[2]);w.scale.set(0.8,0.5,0.8);g.add(w);
    });
    const laneIndex=Math.floor(Math.random()*3);
    const laneX=CONFIG.lanes[laneIndex];
    g.position.set(laneX,0.2,-35-i*22);
    scene.add(g);
    cars.push({obj:g,speed:CONFIG.aiSpeed+Math.random()*40,lane:laneX});
  }
}

function buildObstacles(){
  for(let i=0;i<CONFIG.numObstacles;i++){
    const g=new THREE.Group();
    const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.32,0.55,8),new THREE.MeshStandardMaterial({color:0xcc6600,roughness:0.6}));
    barrel.castShadow=true;g.add(barrel);
    const laneIndex=Math.floor(Math.random()*3);
    const laneX=CONFIG.lanes[laneIndex];
    g.position.set(laneX,0.18,-48-i*38);
    scene.add(g);
    obstacles.push({obj:g,lane:laneX,hit:false});
  }
}

function buildCoins(){
  for(let i=0;i<CONFIG.numCoins;i++){
    const coinGroup=new THREE.Group();
    const coinBody=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,0.03,10),new THREE.MeshStandardMaterial({color:0xffcc00,metalness:0.8,emissive:0xff8800,emissiveIntensity:0.3}));
    coinBody.rotation.x=Math.PI/2;coinGroup.add(coinBody);
    const laneIndex=Math.floor(Math.random()*3);
    const laneX=CONFIG.lanes[laneIndex]+(Math.random()-0.5)*0.7;
    coinGroup.position.set(laneX,0.24,-55-i*20);
    coinGroup.userData={value:15};
    scene.add(coinGroup);
    coins.push(coinGroup);
  }
}

// DECORACIONES
function buildDecorations(){
  // Árboles
  const trunkMat=new THREE.MeshStandardMaterial({color:0x4a2a10});
  const leafMat=new THREE.MeshStandardMaterial({color:0x2a7a2a});
  for(let i=0;i<60;i++){
    const tree=new THREE.Group();
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.25,1.0,5),trunkMat);
    trunk.castShadow=true;tree.add(trunk);
    const leaf=new THREE.Mesh(new THREE.ConeGeometry(0.5,1.0,5),leafMat);
    leaf.position.y=1.1;leaf.castShadow=true;tree.add(leaf);
    const side=(Math.random()>.5?1:-1)*(CONFIG.roadWidth/2+1.8+Math.random()*2);
    tree.position.set(side,0.35,-25-i*14);
    tree.scale.setScalar(0.6+Math.random()*0.5);
    scene.add(tree);
    decorations.push(tree);
  }
  
  // Edificios
  const buildingColors=[0x1a2535,0x252525,0x1e1e2e,0x181828];
  for(let i=0;i<30;i++){
    const bh=2.5+Math.random()*7;
    const bw=1.5+Math.random()*1.8;
    const bd=1.5+Math.random()*1.8;
    const building=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd),new THREE.MeshStandardMaterial({color:buildingColors[i%4],roughness:0.7}));
    const side=(Math.random()>.5?1:-1)*(CONFIG.roadWidth/2+3.2+Math.random()*2.5);
    building.position.set(side,bh/2,-18-i*22);
    building.castShadow=true;building.receiveShadow=true;
    scene.add(building);
    decorations.push(building);
  }
}

function buildEnvironment(){
  const starGeo=new THREE.BufferGeometry();
  const starPos=[];
  for(let i=0;i<800;i++){starPos.push((Math.random()-.5)*300);starPos.push(10+Math.random()*45);starPos.push((Math.random()-.5)*180-50);}
  starGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(starPos),3));
  stars=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.06}));
  scene.add(stars);
}

function buildWeather(){
  const N=800,geo=new THREE.BufferGeometry(),pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){pos[i*3]=(Math.random()-.5)*50;pos[i*3+1]=Math.random()*13;pos[i*3+2]=(Math.random()-.5)*60-25;}
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  rain=new THREE.Points(geo,new THREE.PointsMaterial({color:0x88aaff,size:0.05,transparent:true,opacity:0}));
  scene.add(rain);
}

// ========== FÍSICA ==========
function updatePhysics(dt){
  if(!state.running||state.paused)return;
  const useNitro=keys.nitro&&state.nitro>0.05;
  
  // Aceleración/Freno
  if(keys.up){
    let accel=CONFIG.baseAccel;
    if(useNitro){accel*=CONFIG.nitroMult;state.nitro=Math.max(0,state.nitro-CONFIG.nitroDrain);}
    state.speed=Math.min(CONFIG.maxSpeed,state.speed+accel);
  }else if(keys.down){
    state.speed=Math.max(25,state.speed-CONFIG.baseAccel*1.2);
  }else{
    state.speed=Math.max(40,state.speed*(1-dt*0.3));
  }
  if(!useNitro)state.nitro=Math.min(1,state.nitro+CONFIG.nitroRegen*dt*60);
  
  // Dirección con límites
  const turn=CONFIG.turnBase*(0.5+state.speed/CONFIG.maxSpeed*0.5);
  if(keys.left){state.bikeXVel-=turn*dt*60;state.drift=Math.max(-0.7,state.drift-dt*1.8);}
  else if(keys.right){state.bikeXVel+=turn*dt*60;state.drift=Math.min(0.7,state.drift+dt*1.8);}
  else state.drift*=0.96;
  state.bikeXVel*=0.94;
  
  // Límites estrictos
  let newX=state.bikeX+state.bikeXVel*dt*60;
  if(newX>CONFIG.roadRightLimit)newX=CONFIG.roadRightLimit;
  if(newX<CONFIG.roadLeftLimit)newX=CONFIG.roadLeftLimit;
  state.bikeX=newX;
  
  bikeGroup.position.x=state.bikeX;
  bikeGroup.rotation.z=-state.drift*0.15;
  wheels.forEach(w=>w.rotation.x+=state.speed*0.04*dt*60);
  
  // Cámara
  camera.position.x+=(state.bikeX*0.3-camera.position.x)*0.12;
  camera.position.z=4.8-(state.speed/CONFIG.maxSpeed)*0.7;
  camera.lookAt(state.bikeX*0.4,0.5,-5.5);
  
  const scroll=state.speed*0.2*dt;
  roadLines.forEach(l=>{l.position.z+=scroll;if(l.position.z>8)l.position.z-=240;});
  decorations.forEach(d=>{d.position.z+=scroll*0.85;if(d.position.z>25)d.position.z-=120;});
  
  // Tráfico
  cars.forEach(c=>{
    c.obj.position.z+=(state.speed-c.speed)*dt*0.75+scroll*0.55;
    if(c.obj.position.z>18){
      c.obj.position.z=-55-Math.random()*35;
      const laneIndex=Math.floor(Math.random()*3);
      c.lane=CONFIG.lanes[laneIndex];
      c.obj.position.x=c.lane;
    }
    if(state.invincible<=0){
      const dx=Math.abs(c.obj.position.x-state.bikeX),dz=Math.abs(c.obj.position.z+0.6);
      if(dx<0.95&&dz<1.2){
        state.speed*=0.6;state.score=Math.max(0,state.score-100);state.combo=1;
        state.invincible=1.2;
        state.lives--;
        updateLives();
        if(state.lives<=0)gameOver();
        document.body.classList.add('damage-flash');
        setTimeout(()=>document.body.classList.remove('damage-flash'),200);
        c.obj.position.z+=3;
      }
    }
  });
  
  // Obstáculos
  obstacles.forEach(o=>{
    o.obj.position.z+=scroll;
    if(o.obj.position.z>18){
      o.obj.position.z=-70-Math.random()*50;
      const laneIndex=Math.floor(Math.random()*3);
      o.lane=CONFIG.lanes[laneIndex];
      o.obj.position.x=o.lane;
      o.hit=false;
    }
    if(!o.hit&&state.invincible<=0){
      const dx=Math.abs(o.obj.position.x-state.bikeX),dz=Math.abs(o.obj.position.z+0.4);
      if(dx<0.85&&dz<0.85){
        state.coins=Math.max(0,state.coins-20);
        state.speed*=0.92;
        o.hit=true;
        showFloatingText("-💰20");
      }
    }
  });
  
  // Monedas
  coins.forEach(c=>{
    c.position.z+=scroll;
    c.rotation.y+=0.1;c.rotation.x=Math.sin(Date.now()*0.01)*0.3;
    if(c.position.z>15){
      c.position.z=-90-Math.random()*60;
      const laneIndex=Math.floor(Math.random()*3);
      c.position.x=CONFIG.lanes[laneIndex]+(Math.random()-0.5)*0.7;
    }
    const dx=Math.abs(c.position.x-state.bikeX),dz=Math.abs(c.position.z+0.3);
    if(dx<0.75&&dz<0.85){
      state.coins+=c.userData.value;state.score+=50;state.combo=Math.min(5,state.combo+0.2);
      showFloatingText("+💰"+c.userData.value);
      c.position.z=-105;
      const laneIndex=Math.floor(Math.random()*3);
      c.position.x=CONFIG.lanes[laneIndex];
    }
  });
  
  state.distance+=state.speed*dt;
  state.score+=state.speed*dt*0.7*state.combo;
  state.maxSpeed=Math.max(state.maxSpeed,state.speed);
  if(state.invincible>0)state.invincible-=dt;
  
  updateHUD();
}

function updateLives(){
  const heartsDiv=document.getElementById('lives-panel');
  heartsDiv.innerHTML='';
  for(let i=0;i<3;i++){
    heartsDiv.innerHTML+=`<span class="heart ${i>=state.lives?'lost':''}">❤️</span>`;
  }
}

function showFloatingText(text){
  const div=document.createElement('div');
  div.textContent=text;
  div.className='coin-pop';
  div.style.left='50%';
  div.style.transform='translateX(-50%)';
  div.style.top=window.innerHeight/2+'px';
  div.style.color=text.includes('+')?'#ffcc00':'#ff6666';
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),700);
}

function updateWeather(dt){
  if(Math.random()<0.001){
    const types=['clear','clear','rain','fog'];
    state.weather=types[Math.floor(Math.random()*types.length)];
    const icons={clear:'☀️',rain:'🌧️',fog:'🌫️'};
    document.getElementById('weather-icon').textContent=icons[state.weather];
    if(state.weather==='rain'){rain.material.opacity=0.45;scene.fog.density=0.018;}
    else if(state.weather==='fog'){rain.material.opacity=0;scene.fog.density=0.045;}
    else{rain.material.opacity=0;scene.fog.density=0.012;}
  }
  if(state.weather==='rain')rain.rotation.y+=0.012;
  state.timeOfDay+=dt*0.0005;
  if(state.timeOfDay>1)state.timeOfDay=0;
  const intensity=0.4+Math.sin(state.timeOfDay*Math.PI)*0.6;
  sunLight.intensity=intensity*(settings.nightMode?0.4:1);
}

function updateHUD(){
  document.getElementById('speed-val').textContent=Math.floor(state.speed);
  document.getElementById('coin-count').textContent=Math.floor(state.coins);
  document.getElementById('score-val').textContent=Math.floor(state.score);
  const comboDiv=document.getElementById('combo-pop');
  if(state.combo>1.1){
    comboDiv.textContent=`⚡ COMBO x${state.combo.toFixed(1)} ⚡`;
    comboDiv.style.opacity='0.8';
    setTimeout(()=>comboDiv.style.opacity='0',250);
  }
}

function spawnExhaust(){
  if(!state.running||state.paused||state.speed<60)return;
  const useNitro=keys.nitro&&state.nitro>0.05;
  const p=new THREE.Mesh(new THREE.SphereGeometry(0.05,4),new THREE.MeshStandardMaterial({color:useNitro?0x00aaff:0xff7733,emissive:useNitro?0x0088ff:0xff4400}));
  p.position.set(state.bikeX+(Math.random()-.5)*0.3,0.1,-1.05);
  scene.add(p);
  exhaustParticles.push({mesh:p,life:1});
}

function updateExhaust(dt){
  for(let i=exhaustParticles.length-1;i>=0;i--){
    exhaustParticles[i].life-=dt*2.5;
    exhaustParticles[i].mesh.material.opacity=exhaustParticles[i].life;
    if(exhaustParticles[i].life<=0){scene.remove(exhaustParticles[i].mesh);exhaustParticles.splice(i,1);}
  }
}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.033);
  updatePhysics(dt);
  updateWeather(dt);
  updateExhaust(dt);
  lastExhaust+=dt;
  if(lastExhaust>0.05){spawnExhaust();lastExhaust=0;}
  if(stars)stars.rotation.y+=dt*0.0003;
  renderer.render(scene,camera);
}

// ========== CONTROLES TÁCTILES ==========
function initControls(){
  // Volante táctil
  const wheel=document.getElementById('steering-wheel');
  let wheelActive=false;
  const onWheelStart=(e)=>{e.preventDefault();wheelActive=true;};
  const onWheelMove=(e)=>{
    if(!wheelActive||!settings.useButtons)return;
    const rect=wheel.getBoundingClientRect();
    const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const percent=x/rect.width;
    if(percent<0.3){keys.left=true;keys.right=false;}
    else if(percent>0.7){keys.right=true;keys.left=false;}
    else{keys.left=false;keys.right=false;}
  };
  const onWheelEnd=()=>{wheelActive=false;keys.left=false;keys.right=false;};
  wheel.addEventListener('mousedown',onWheelStart);
  window.addEventListener('mousemove',onWheelMove);
  window.addEventListener('mouseup',onWheelEnd);
  wheel.addEventListener('touchstart',onWheelStart,{passive:false});
  window.addEventListener('touchmove',onWheelMove,{passive:false});
  window.addEventListener('touchend',onWheelEnd);
  
  function bindPedal(id,onPress,onRelease){
    const btn=document.getElementById(id);
    const start=(e)=>{e.preventDefault();onPress();};
    const end=(e)=>{e.preventDefault();onRelease();};
    btn.addEventListener('mousedown',start);btn.addEventListener('mouseup',end);
    btn.addEventListener('mouseleave',end);btn.addEventListener('touchstart',start,{passive:false});
    btn.addEventListener('touchend',end);btn.addEventListener('touchcancel',end);
  }
  bindPedal('gas-pedal',()=>keys.up=true,()=>keys.up=false);
  bindPedal('brake-pedal',()=>keys.down=true,()=>keys.down=false);
  bindPedal('nitro-btn',()=>keys.nitro=true,()=>keys.nitro=false);
  
  document.getElementById('pause-main').addEventListener('click',togglePause);
  document.getElementById('resume-btn').addEventListener('click',togglePause);
}

function togglePause(){
  if(!state.running)return;
  state.paused=!state.paused;
  document.getElementById('pause-panel').classList.toggle('visible',state.paused);
}

function startGame(){
  state={...state,running:true,paused:false,speed:50,nitro:0.8,bikeX:0,bikeXVel:0,
    score:0,coins:0,lives:3,distance:0,maxSpeed:0,combo:1,invincible:0};
  bikeGroup.position.x=0;keys.up=true;
  updateLives();
  document.getElementById('main-menu').classList.add('hidden');
  document.getElementById('gameover-panel').classList.remove('visible');
  document.getElementById('pause-panel').classList.remove('visible');
}

function gameOver(){
  state.running=false;
  document.getElementById('go-score').textContent=Math.floor(state.score);
  document.getElementById('go-dist').textContent=Math.floor(state.distance);
  document.getElementById('go-coins').textContent=Math.floor(state.coins);
  const best=localStorage.getItem('motoBestM')||0;
  const newBest=Math.max(state.score,best);
  localStorage.setItem('motoBestM',Math.floor(newBest));
  localStorage.setItem('motoCoinsM',(+(localStorage.getItem('motoCoinsM')||0)+state.coins));
  document.getElementById('go-record').textContent=Math.floor(newBest);
  document.getElementById('gameover-panel').classList.add('visible');
}

function setupMenus(){
  document.getElementById('start-btn').addEventListener('click',startGame);
  document.getElementById('restart-btn').addEventListener('click',()=>{document.getElementById('gameover-panel').classList.remove('visible');startGame();});
  document.getElementById('menu-back').addEventListener('click',()=>{document.getElementById('gameover-panel').classList.remove('visible');document.getElementById('main-menu').classList.remove('hidden');});
  document.getElementById('settings-btn').addEventListener('click',()=>{document.getElementById('main-menu').classList.add('hidden');document.getElementById('settings-menu').classList.remove('hidden');});
  document.getElementById('settings-back').addEventListener('click',()=>{document.getElementById('settings-menu').classList.add('hidden');document.getElementById('main-menu').classList.remove('hidden');});
  document.getElementById('stats-btn').addEventListener('click',()=>{
    const best=localStorage.getItem('motoBestM')||0;
    const coins=localStorage.getItem('motoCoinsM')||0;
    alert(`🏆 ESTADÍSTICAS\n\nMejor Puntaje: ${Math.floor(best)}\n💰 Monedas totales: ${Math.floor(coins)}`);
  });
  
  const ctrlToggle=document.getElementById('ctrl-toggle');
  ctrlToggle.addEventListener('click',()=>{
    settings.useButtons=!settings.useButtons;
    ctrlToggle.classList.toggle('active',settings.useButtons);
  });
  const nightToggle=document.getElementById('night-toggle');
  nightToggle.addEventListener('click',()=>{
    settings.nightMode=!settings.nightMode;
    nightToggle.classList.toggle('active',settings.nightMode);
  });
}

// Orientación horizontal
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

window.addEventListener('load',()=>{
  initThree();
  initControls();
  setupMenus();
  animate();
  document.getElementById('coin-count').textContent=localStorage.getItem('motoCoinsM')||0;
});
})();
</script>
